<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Markdown Editor - Fixes v2</title>
    <!-- Markdown parsing library -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        /* --- CSS Variables for Theming --- */
        /* Defines colors and styles for the default light theme */
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --controls-bg: #ffffff;
            --controls-border: #e2e8f0;
            --button-bg: #f1f5f9;
            --button-hover-bg: #e2e8f0;
            --button-border: #cbd5e1;
            --sidebar-bg: #ffffff;
            --sidebar-header-bg: #f8fafc;
            --sidebar-border: #e2e8f0;
            --sidebar-item-hover-bg: #f1f5f9;
            --sidebar-item-active-bg: #eff6ff;
            --tab-bg: #f1f5f9;
            --tab-active-bg: var(--bg-color);
            --tab-border: #e2e8f0;
            --tab-container-bg: #f1f5f9;
            --editor-bg: #ffffff;
            --preview-bg: #ffffff;
            --resizer-bg: #e2e8f0;
            --resizer-border: #cbd5e1;
            --toolbar-bg: #f8fafc;
            --toolbar-border: #e2e8f0;
            --statusbar-bg: #f8fafc;
            --statusbar-text: #64748b;
            --findbar-bg: #f8fafc;
            --findbar-border: #e2e8f0;
            --link-color: #2563eb;
            --tag-bg: #f1f5f9;
            --tag-border: #e2e8f0;
            --tag-active-bg: #2563eb;
            --tag-active-color: #ffffff;
            --tag-active-border: #2563eb;
            --code-bg: #f1f5f9;
            --pre-bg: #f8fafc;
            --blockquote-border: #cbd5e1;
            --blockquote-color: #64748b;
            --hr-color: #e2e8f0;
            --search-result-bg: #ffffff;
            --search-result-hover-bg: #f1f5f9;
            --search-result-border: #e2e8f0;
            --menu-bg: #ffffff;
            --menu-border: #e2e8f0;
            --menu-hover-bg: #f1f5f9;
            --placeholder-color: #94a3b8;
            --icon-color: #94a3b8;
            --icon-hover-color: #475569;
            --preview-bg-rgb: 255, 255, 255;
            --dark-mode-invert: 0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
        }

        body.dark-mode {
            --bg-color: #0f172a;
            --text-color: #e2e8f0;
            --controls-bg: #1e293b;
            --controls-border: #334155;
            --button-bg: #334155;
            --button-hover-bg: #475569;
            --button-border: #475569;
            --sidebar-bg: #1e293b;
            --sidebar-header-bg: #1e293b;
            --sidebar-border: #334155;
            --sidebar-item-hover-bg: #334155;
            --sidebar-item-active-bg: #1e3a5f;
            --tab-bg: #1e293b;
            --tab-active-bg: var(--bg-color);
            --tab-border: #334155;
            --tab-container-bg: #1a2332;
            --editor-bg: #0f172a;
            --preview-bg: #0f172a;
            --resizer-bg: #334155;
            --resizer-border: #475569;
            --toolbar-bg: #1e293b;
            --toolbar-border: #334155;
            --statusbar-bg: #1e293b;
            --statusbar-text: #94a3b8;
            --findbar-bg: #1e293b;
            --findbar-border: #334155;
            --link-color: #60a5fa;
            --tag-bg: #334155;
            --tag-border: #475569;
            --tag-active-bg: #3b82f6;
            --tag-active-color: #ffffff;
            --tag-active-border: #3b82f6;
            --code-bg: #1e293b;
            --pre-bg: #1e293b;
            --blockquote-border: #475569;
            --blockquote-color: #94a3b8;
            --hr-color: #334155;
            --search-result-bg: #1e293b;
            --search-result-hover-bg: #334155;
            --search-result-border: #334155;
            --menu-bg: #1e293b;
            --menu-border: #334155;
            --menu-hover-bg: #334155;
            --placeholder-color: #64748b;
            --icon-color: #64748b;
            --icon-hover-color: #cbd5e1;
            --preview-bg-rgb: 15, 23, 42;
            --dark-mode-invert: 1;
        }
        /* --- End Theming --- */

        /* --- Icon & Button Standard Sizing --- */
        i[data-lucide] { width: 16px; height: 16px; display: block; }
        button:has([data-lucide]), .close-tab-btn, .pin-note-btn { display: inline-flex; align-items: center; justify-content: center; gap: 4px; }
        .controls button:has([data-lucide]), #sidebarToggleBtn { height: 30px; box-sizing: border-box; }

        /* --- Basic Layout & Body --- */
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; background-color: var(--bg-color); color: var(--text-color); position: relative; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        /* --- Top Controls Bar --- */
        .controls { padding: 10px 14px; background-color: var(--controls-bg); border-bottom: 1px solid var(--controls-border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; position: relative; z-index: 10; box-shadow: var(--shadow-sm); }
        .controls button, .controls select, .controls input[type="search"] { padding: 6px 12px; cursor: pointer; border: 1px solid var(--button-border); border-radius: var(--radius-md); background-color: var(--button-bg); color: var(--text-color); font-size: 13px; font-family: inherit; white-space: nowrap; transition: all 0.15s ease; height: 30px; box-sizing: border-box; outline: none; }
        .controls button:focus-visible, .controls select:focus-visible, .controls input:focus-visible { outline: 2px solid var(--tag-active-bg); outline-offset: 1px; }
        .controls button:hover, .controls input[type="search"]:hover, .controls select:hover { background-color: var(--button-hover-bg); border-color: var(--resizer-border); }
        .controls label { margin-left: 6px; font-weight: 500; white-space: nowrap; font-size: 12px; color: var(--statusbar-text); letter-spacing: 0.02em; }
        #noteSwitcher { max-width: 150px; }
        #searchInput { flex-grow: 1; min-width: 120px; max-width: 220px; background-color: var(--editor-bg); }
        #searchInput::placeholder { color: var(--placeholder-color); }

        /* --- Menu Button and Dropdown --- */
        #menuContainer { position: relative; display: inline-block; z-index: 13; /* Needed for absolute positioning of dropdown */ }
        #menuToggleBtn { font-weight: 600; }
        #menuDropdown { display: none; position: absolute; top: 100%; left: 0; background-color: var(--menu-bg); min-width: 200px; box-shadow: var(--shadow-lg); z-index: 15; border: 1px solid var(--menu-border); border-radius: var(--radius-lg); padding: 6px 0; }
        #menuDropdown.visible { display: block; }
        .menu-item { display: block; width: 100%; padding: 9px 14px; text-align: left; border: none; background: none; font-size: 13px; font-family: inherit; cursor: pointer; box-sizing: border-box; color: var(--text-color); transition: background-color 0.1s ease; }
        .menu-item:hover { background-color: var(--menu-hover-bg); }
        .menu-separator { height: 1px; background-color: var(--controls-border); margin: 6px 0; }

        /* --- Main Application Container (Sidebar + Main Content) --- */
        #appContainer { display: flex; flex-grow: 1; overflow: hidden; position: relative; }

        /* --- Sidebar (Fixed Overlay, Slides from Left) --- */
        #sidebar { position: fixed; left: 0; top: 0; height: 100%; width: 260px; background-color: var(--sidebar-bg); display: flex; flex-direction: column; z-index: 100; transform: translateX(-100%); transition: transform 0.35s ease; overflow: hidden; }
        #sidebar.open { transform: translateX(0); box-shadow: 0 0 20px rgba(0,0,0,0.2); }

        /* Sidebar overlay backdrop */
        #sidebarOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 99; cursor: pointer; }
        #sidebar.open ~ #sidebarOverlay { display: block; }

        /* Sidebar Header (w3schools style dark bar) */
        .sidebar-header { padding: 0; background-color: var(--tag-active-bg); flex-shrink: 0; display: flex; align-items: center; min-height: 48px; }
        .sidebar-header h3 { margin: 0; padding: 0 16px; font-size: 15px; font-weight: 600; color: #fff; flex-grow: 1; display: flex; align-items: center; letter-spacing: 0.01em; }
        #sidebarCloseBtn { display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; border: none; background: transparent; color: #fff; cursor: pointer; flex-shrink: 0; transition: background 0.15s ease; }
        #sidebarCloseBtn:hover { background: rgba(255,255,255,0.15); }

        /* Sidebar toolbar (sort) */
        .sidebar-toolbar { padding: 12px 16px; border-bottom: 1px solid var(--sidebar-border); flex-shrink: 0; }
        .sidebar-toolbar #sortOrder { width: 100%; font-size: 12px; padding: 6px 8px; border-radius: var(--radius-md); background-color: var(--button-bg); color: var(--text-color); border: 1px solid var(--button-border); font-family: inherit; cursor: pointer; }

        #tagSection { padding: 12px 16px; border-bottom: 1px solid var(--sidebar-border); flex-shrink: 0; }
        #tagSection h4 { margin: 0 0 8px 0; font-size: 11px; font-weight: 600; color: var(--statusbar-text); text-transform: uppercase; letter-spacing: 0.05em; }
        #tagList { max-height: 110px; overflow-y: auto; }
        .tag-button { font-size: 11px; background-color: var(--tag-bg); border: 1px solid var(--tag-border); border-radius: 12px; padding: 3px 8px; margin-right: 4px; margin-bottom: 4px; cursor: pointer; display: inline-block; color: var(--text-color); transition: all 0.15s ease; }
        .tag-button:hover { background-color: var(--button-hover-bg); }
        .tag-button.active-tag { background-color: var(--tag-active-bg); color: var(--tag-active-color); border-color: var(--tag-active-border); }
        #clearTagFilterBtn { font-size: 10px; margin-left: 5px; background: none; border: none; color: var(--link-color); cursor: pointer; padding: 0; }
        #clearTagFilterBtn:hover { text-decoration: underline; }

        #sidebarNoteList { list-style: none; padding: 4px 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .sidebar-note-item { display: flex; align-items: center; padding: 9px 8px 9px 16px; cursor: pointer; border-bottom: 1px solid var(--hr-color); transition: background-color 0.12s ease; }
        .sidebar-note-item:hover { background-color: var(--sidebar-item-hover-bg); }
        .note-name-sidebar { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; font-weight: 400; margin-right: 6px; }
        .pin-note-btn { background: none; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; opacity: 0; flex-shrink: 0; color: var(--icon-color); border-radius: var(--radius-sm); transition: opacity 0.15s ease, background-color 0.15s ease; }
        .pin-note-btn:hover { background-color: var(--button-hover-bg); color: var(--icon-hover-color); }
        .sidebar-note-item:hover .pin-note-btn,
        .sidebar-note-item .pin-note-btn.pinned { opacity: 1; }
        .sidebar-note-item.active-note-sidebar { background-color: var(--sidebar-item-active-bg); font-weight: 500; border-left: 3px solid var(--tag-active-bg); padding-left: 13px; }
        .sidebar-note-item.active-note-sidebar .note-name-sidebar { color: var(--link-color); }

        /* Sidebar toggle button in controls */
        #sidebarToggleBtn { display: inline-flex; align-items: center; justify-content: center; height: 30px; width: 30px; box-sizing: border-box; padding: 0; border: 1px solid var(--button-border); border-radius: var(--radius-md); background-color: var(--button-bg); color: var(--icon-color); cursor: pointer; transition: all 0.15s ease; }
        #sidebarToggleBtn:hover { background-color: var(--button-hover-bg); color: var(--icon-hover-color); }
        /* --- End Sidebar Styles --- */

        /* --- Main Content Area (Tabs, Editor, Preview) --- */
        #mainContent { flex-grow: 1; /* Take remaining horizontal space */ display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 1; }

        /* Tab Bar Styles */
        #tabs { display: flex; align-items: flex-end; background-color: var(--tab-container-bg); padding: 6px 8px 0 6px; flex-wrap: nowrap; overflow-x: auto; border-bottom: 1px solid var(--tab-border); min-height: 38px; box-sizing: border-box; flex-shrink: 0; gap: 2px; }
        .tab { display: inline-flex; align-items: center; padding: 7px 10px 7px 14px; cursor: pointer; border: 1px solid var(--tab-border); border-bottom: none; background-color: var(--tab-bg); color: var(--text-color); border-radius: var(--radius-md) var(--radius-md) 0 0; white-space: nowrap; position: relative; max-width: 180px; font-size: 13px; line-height: 1; transition: background-color 0.15s ease, box-shadow 0.15s ease; }
        .tab-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-grow: 1; margin-right: 6px; }
        .close-tab-btn { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; color: var(--icon-color); margin-left: auto; border-radius: var(--radius-sm); flex-shrink: 0; transition: all 0.15s ease; }
        .close-tab-btn:hover { background-color: var(--button-hover-bg); color: var(--icon-hover-color); }
        .tab.active { background-color: var(--tab-active-bg); border-bottom: 1px solid var(--tab-active-bg); z-index: 1; position: relative; top: 1px; font-weight: 500; }
        .tab:not(.active):hover { background-color: var(--button-hover-bg); }
        #addTabBtn { display: inline-flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 500; width: 28px; height: 28px; margin-left: 4px; border: 1px dashed var(--button-border); border-radius: var(--radius-md); background-color: transparent; color: var(--icon-color); align-self: center; margin-bottom: 2px; transition: all 0.15s ease; }
        #addTabBtn:hover { background-color: var(--button-hover-bg); color: var(--icon-hover-color); border-style: solid; }

        #editorToolbar { padding: 8px 12px; background-color: var(--toolbar-bg); border-bottom: 1px solid var(--toolbar-border); flex-shrink: 0; user-select: none; }
        #editorToolbar button { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 13px; padding: 5px 10px; margin-right: 4px; cursor: pointer; border: 1px solid var(--button-border); background-color: var(--button-bg); color: var(--text-color); border-radius: var(--radius-md); min-width: 30px; text-align: center; transition: all 0.15s ease; }
        #editorToolbar button:hover { background-color: var(--button-hover-bg); border-color: var(--resizer-border); }
        #editorToolbar .heading-btn { font-size: 11px; font-weight: 600; }

        #findReplaceBar { display: none; padding: 6px 12px; background-color: var(--findbar-bg); border-bottom: 1px solid var(--findbar-border); flex-shrink: 0; font-size: 13px; align-items: center; gap: 6px; }
        #findReplaceBar input[type="text"] { font-size: 13px; padding: 4px 8px; border: 1px solid var(--button-border); border-radius: var(--radius-md); background-color: var(--editor-bg); color: var(--text-color); font-family: inherit; }
        #findReplaceBar button { font-size: 12px; padding: 4px 9px; cursor: pointer; border: 1px solid var(--button-border); background-color: var(--button-bg); color: var(--text-color); border-radius: var(--radius-md); font-family: inherit; transition: all 0.1s ease; }
        #findReplaceBar button:hover { background-color: var(--button-hover-bg); }
        #findReplaceCloseBtn { margin-left: auto; font-weight: 500; color: var(--icon-color); }
        #findReplaceCloseBtn:hover { color: var(--icon-hover-color); }

        .container { display: flex; flex-grow: 1; overflow: hidden; z-index: 0; background-color: var(--editor-bg); }
        #editorContainer { display: flex; flex-direction: column; flex-basis: 50%; flex-shrink: 1; flex-grow: 1; min-width: 100px; height: 100%; overflow: hidden; background-color: var(--editor-bg); }
        #editor { flex-grow: 1; border: none; resize: none; font-family: 'JetBrains Mono', 'Fira Code', monospace; background-color: var(--editor-bg); color: var(--text-color); outline: none; height: auto; width: 100%; padding: 20px; box-sizing: border-box; overflow-y: auto; font-size: 14px; line-height: 1.7; }
        #statusBar { padding: 3px 14px; font-size: 11px; color: var(--statusbar-text); background-color: var(--statusbar-bg); border-top: 1px solid var(--controls-border); text-align: right; flex-shrink: 0; white-space: nowrap; letter-spacing: 0.02em; }
        #resizer { flex-basis: 5px; flex-shrink: 0; flex-grow: 0; cursor: col-resize; background-color: var(--resizer-bg); height: 100%; box-sizing: border-box; user-select: none; transition: background-color 0.15s ease; }
        #resizer:hover { background-color: var(--tag-active-bg); }
        #preview { flex-basis: 50%; flex-shrink: 1; flex-grow: 1; background-color: var(--preview-bg); color: var(--text-color); min-width: 100px; height: 100%; padding: 20px; box-sizing: border-box; overflow-y: auto; font-size: 14px; line-height: 1.7; border-left: none; }

        /* --- Markdown Preview Specific Styles --- */
        #preview { font-family: 'Inter', system-ui, sans-serif; }
        #preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6 { margin-top: 1.2em; margin-bottom: 0.5em; border-bottom: 1px solid var(--hr-color); padding-bottom: 0.3em; font-weight: 600; line-height: 1.3; }
        #preview h1 { font-size: 1.8em; }
        #preview h2 { font-size: 1.5em; }
        #preview h3 { font-size: 1.25em; }
        #preview code { background-color: var(--code-bg); padding: 0.2em 0.4em; border-radius: var(--radius-sm); font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }
        #preview pre { background-color: var(--pre-bg); padding: 14px; border-radius: var(--radius-md); overflow-x: auto; border: 1px solid var(--controls-border); }
        #preview pre code { background-color: transparent; padding: 0; border: none; }
        #preview blockquote { border-left: 3px solid var(--blockquote-border); padding-left: 14px; color: var(--blockquote-color); margin: 1em 0; }
        #preview ul, #preview ol { padding-left: 22px; }
        #preview .task-list-item { list-style-type: none; margin-left: -1.4em; }
        #preview .task-list-item input[type="checkbox"] { margin-right: 0.5em; filter: invert(var(--dark-mode-invert, 0)); }
        #preview table { border-collapse: collapse; width: auto; margin: 1em 0; }
        #preview th, #preview td { border: 1px solid var(--tab-border); padding: 8px 14px; }
        #preview th { font-weight: 600; background-color: var(--button-bg); }
        #preview img { max-width: 100%; border-radius: var(--radius-md); }
        #preview hr { border: 0; border-top: 1px solid var(--hr-color); margin: 1.5em 0; }
        #preview a { color: var(--link-color); text-decoration: none; }
        #preview a:hover { text-decoration: underline; }

        /* --- Mode Toggle Buttons --- */
        .mode-toggle { display: inline-flex; gap: 0; flex-shrink: 0; }
        .mode-btn { font-family: inherit; font-size: 13px; font-weight: 500; padding: 6px 14px; cursor: pointer; border: 1px solid var(--button-border); background-color: var(--button-bg); color: var(--text-color); transition: all 0.15s ease; height: 30px; box-sizing: border-box; }
        .mode-btn:first-child { border-radius: var(--radius-md) 0 0 var(--radius-md); }
        .mode-btn:last-child { border-radius: 0 var(--radius-md) var(--radius-md) 0; margin-left: -1px; }
        .mode-btn:hover { background-color: var(--button-hover-bg); z-index: 1; position: relative; }
        .mode-btn.active { background-color: var(--tag-active-bg); color: var(--tag-active-color); border-color: var(--tag-active-border); z-index: 2; position: relative; }

        /* Viewer Mode Styles */
        body.viewer-mode #editorContainer { display: none; }
        body.viewer-mode #resizer { display: none; }
        body.viewer-mode #editorToolbar { display: none; }
        body.viewer-mode #findReplaceBar { display: none !important; }
        body.viewer-mode .container { display: block; }
        body.viewer-mode #preview { height: 100%; }
        #modeIndicator { display: none; position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); padding: 6px 22px; background: var(--tag-active-bg); color: #fff; border-radius: 20px; font-size: 12px; font-weight: 500; z-index: 999; opacity: 0.9; pointer-events: none; box-shadow: var(--shadow-md); backdrop-filter: blur(4px); }
        body.viewer-mode #modeIndicator { display: block; }

        /* --- Settings Modal --- */
        #settingsOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
        #settingsOverlay.open { display: flex; }
        #settingsModal { background-color: var(--menu-bg); border-radius: var(--radius-lg); box-shadow: 0 20px 60px rgba(0,0,0,0.2); width: 420px; max-width: 90vw; max-height: 80vh; overflow-y: auto; padding: 0; }
        .settings-header { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--controls-border); }
        .settings-header h2 { margin: 0; font-size: 16px; font-weight: 600; flex-grow: 1; }
        #settingsCloseBtn { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border: none; background: none; color: var(--icon-color); cursor: pointer; border-radius: var(--radius-sm); transition: all 0.15s ease; }
        #settingsCloseBtn:hover { background-color: var(--button-hover-bg); color: var(--icon-hover-color); }
        .settings-body { padding: 20px; }
        .settings-group { margin-bottom: 20px; }
        .settings-group:last-child { margin-bottom: 0; }
        .settings-group h3 { margin: 0 0 10px 0; font-size: 13px; font-weight: 600; color: var(--statusbar-text); text-transform: uppercase; letter-spacing: 0.05em; }
        .settings-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .settings-row:last-child { margin-bottom: 0; }
        .settings-row label { font-size: 13px; color: var(--text-color); cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .settings-row input[type="radio"] { accent-color: var(--tag-active-bg); cursor: pointer; margin: 0; }
        .settings-lang-select { display: flex; gap: 8px; align-items: center; }
        .settings-lang-select input { flex-grow: 1; padding: 6px 10px; font-size: 13px; border: 1px solid var(--button-border); border-radius: var(--radius-md); background-color: var(--button-bg); color: var(--text-color); font-family: inherit; cursor: default; }
        .settings-lang-select button { padding: 6px 12px; font-size: 13px; border: 1px solid var(--button-border); border-radius: var(--radius-md); background-color: var(--button-bg); color: var(--text-color); cursor: pointer; font-family: inherit; transition: all 0.15s ease; white-space: nowrap; }

        /* --- Search Results Overlay --- */
        #searchResults { position: absolute; top: 56px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 700px; max-height: 70vh; overflow-y: auto; background-color: var(--menu-bg); border: 1px solid var(--controls-border); border-radius: var(--radius-lg); box-shadow: 0 20px 60px rgba(0,0,0,0.15); padding: 24px; z-index: 1000; display: none; font-size: 14px; color: var(--text-color); }
        #searchCloseBtn { position: absolute; top: 8px; right: 12px; display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; color: var(--icon-color); cursor: pointer; border: none; background: none; border-radius: var(--radius-sm); transition: all 0.15s ease; }

<body>

    <!-- Top Control Bar: Contains main actions like menu, open, close, switch, search, theme -->

                <button id="newNoteBtn" class="menu-item" data-lang-key="menu.new_note">Add New Note (Ctrl+N)</button>

    <!-- Sidebar (Fixed Overlay) -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h3><i data-lucide="book-open" style="width:18px;height:18px;margin-right:4px;display:inline-block;vertical-align:middle"></i> <span id="sidebarTitle">Notes</span></h3>

    <!-- Main Application Area -->

        <!-- Main Content Area: Contains Tabs, Editor Toolbar, Find/Replace, Editor, Preview -->
        <div id="mainContent">
            <!-- Tab Bar: Displays open notes as tabs -->
            <div id="tabs">
                 <!-- Button to add a new note/tab -->

                 <!-- Tabs for open notes will be rendered here -->
            </div>
             <!-- Editor Toolbar: Buttons for Markdown formatting -->
             <div id="editorToolbar">

                     <!-- The main Markdown text editing area -->

                         <span id="wordCount">Words: 0</span> | <span id="charCount">Chars: 0</span>
                     </div>

    <!-- Search Results Overlay: Modal-like display for search results -->
    <div id="searchResults">
        <button id="searchCloseBtn" title="Close Search Results"><i data-lucide="x"></i></button>
        <h3>Search Results</h3>

    <!-- Settings Modal -->
    <div id="settingsOverlay">
        <div id="settingsModal">
            <div class="settings-header">

                <h2>Markdown Editor</h2>

                <a class="about-link" href="#" id="aboutWebsiteLink">http://www.riasoft.net</a>

                <button id="aboutCloseBtn">Close</button>
            </div>
        </div>
    </div>

    <div id="modeIndicator">Viewer Mode</div>

    <script type="module">
        import { invoke } from '@tauri-apps/api/core';
        import { open, save, message, ask } from '@tauri-apps/plugin-dialog';
        import { getCurrentWindow } from '@tauri-apps/api/window';
        // --- DOM References ---
        // Get references to all the important HTML elements to interact with them in JS
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const tabsContainer = document.getElementById('tabs');
        const openBtn = document.getElementById('openBtn'); // For single file open
        const saveBtn = document.getElementById('saveBtn'); // From menu
        const newNoteBtn = document.getElementById('newNoteBtn'); // From menu
        const renameBtn = document.getElementById('renameBtn'); // From menu
        const closeNoteBtn = document.getElementById('closeNoteBtn'); // Top control bar button
        const noteSwitcher = document.getElementById('noteSwitcher'); // Dropdown in controls
        const searchInput = document.getElementById('searchInput'); // Search text input
        const searchBtn = document.getElementById('searchBtn'); // Search trigger button
        const searchResults = document.getElementById('searchResults'); // Search results overlay div
        const searchResultsContent = document.getElementById('searchResultsContent'); // Inner div for results
        const searchCloseBtn = document.getElementById('searchCloseBtn'); // Close button for search overlay
        const sidebar = document.getElementById('sidebar'); // The entire sidebar container
        const sidebarToggleBtn = document.getElementById('sidebarToggleBtn'); // Button to collapse/expand sidebar
        const sidebarNoteList = document.getElementById('sidebarNoteList'); // UL element for note list in sidebar
        const sortOrderSelect = document.getElementById('sortOrder'); // Dropdown for sorting notes
        const tagListContainer = document.getElementById('tagList'); // Div to hold tag buttons
        const clearTagFilterBtn = document.getElementById('clearTagFilterBtn'); // Button to clear active tag filter
        const menuToggleBtn = document.getElementById('menuToggleBtn'); // Main menu button
        const menuDropdown = document.getElementById('menuDropdown'); // The dropdown menu itself
        const findReplaceToggleBtn = document.getElementById('findReplaceToggleBtn'); // Menu item to show find/replace
        const themeToggleBtn = document.getElementById('themeToggleBtn'); // Theme toggle in controls
        const themeToggleBtnMenu = document.getElementById('themeToggleBtnMenu'); // Theme toggle in menu
        const exportAllBtn = document.getElementById('exportAllBtn'); // Menu item for exporting all notes
        const importBtn = document.getElementById('importBtn'); // Menu item for importing .md files
        const importFolderBtn = document.getElementById('importFolderBtn'); // Menu item for importing a folder
        const addTabBtn = document.getElementById('addTabBtn'); // '+' button in tab bar
        const resizer = document.getElementById('resizer'); // Draggable element between editor/preview
        const container = document.querySelector('.container'); // Container holding editor/preview/resizer
        const editorContainer = document.getElementById('editorContainer'); // Div containing editor + status bar
        const editorToolbar = document.getElementById('editorToolbar'); // Toolbar above the editor
        const wordCountSpan = document.getElementById('wordCount'); // Span in status bar for word count
        const charCountSpan = document.getElementById('charCount'); // Span in status bar for char count
        const findReplaceBar = document.getElementById('findReplaceBar'); // The find/replace bar div
        const findInput = document.getElementById('findInput'); // Find text input
        const replaceInput = document.getElementById('replaceInput'); // Replace text input
        const findPrevBtn = document.getElementById('findPrevBtn'); // Find previous button
        const findNextBtn = document.getElementById('findNextBtn'); // Find next button
        const replaceBtn = document.getElementById('replaceBtn'); // Replace current button
        const replaceAllBtn = document.getElementById('replaceAllBtn'); // Replace all button
        const findMatchCount = document.getElementById('findMatchCount'); // Span to show match count (e.g., 1/5)
        const findReplaceCloseBtn = document.getElementById('findReplaceCloseBtn'); // Close button for find bar
        const viewerModeBtn = document.getElementById('viewerModeBtn'); // Viewer mode button
        const editorModeBtn = document.getElementById('editorModeBtn'); // Editor mode button


        // --- State Variables ---
        // These variables hold the application's current state
        let notes = []; // Array to store all note objects {id, name, content, isPinned, createdAt, updatedAt}
        let activeNoteId = null; // The ID of the currently displayed note in the editor
        let untitledCounter = 1; // Counter for naming new "Untitled" notes
        let isSidebarOpen = false; // Tracks whether the sidebar is open
        let firstAddedNoteIdDuringImport = null; // Tracks the first note added during a multi-file/folder import to activate it
        let isResizing = false; // Flag to indicate if the editor/preview resizer is being dragged
        let unsavedChanges = false; // Flag to track if the current note has changes not saved to a file (used for beforeunload warning)
        let findState = { query: '', matches: [], currentIndex: -1 }; // Holds state for find operation (search term, match positions, current index)
        let currentSortOrder = 'modified-desc'; // Default sort order for the sidebar note list
        let activeFilterTag = null; // Stores the tag currently used for filtering the sidebar list, or null if no filter
        let currentTheme = 'light'; // Tracks the current theme ('light' or 'dark')
        let currentMode = 'viewer'; // Tracks Editor/Viewer mode ('editor' or 'viewer')
        let autoSaveTimer = null; // Timer ID for debouncing auto-save to localStorage


        // --- Library Configuration ---
        // Configure the 'marked' library for Markdown parsing
        marked.setOptions({
             breaks: true,       // Interpret carriage returns as <br> tags (GFM style)
             gfm: true,          // Enable GitHub Flavored Markdown extensions
             pedantic: false,    // Don't be strict about parsing ambiguities
             smartLists: true,   // Use smarter list behavior than original markdown
             smartypants: false // Don't automatically convert quotes/dashes to smart entities
        });

        // --- Core Helper Functions ---

        /**
         * Finds a note object in the `notes` array by its ID.
         * @param {number|string} id - The ID of the note to find.
         * @returns {object|undefined} The note object if found, otherwise undefined.
         */
        function findNoteById(id) { const numericId = Number(id); return notes.find(note => note.id === numericId); }

        /**
         * Finds the index of a note in the `notes` array by its ID.
         * @param {number|string} id - The ID of the note to find.
         * @returns {number} The index of the note if found, otherwise -1.
         */
        function findNoteIndexById(id) { const numericId = Number(id); return notes.findIndex(note => note.id === numericId); }

        /**
         * Updates the preview pane by parsing the editor's content using 'marked'.
         * Handles potential parsing errors.
         */
        function updatePreview() {
            if (activeNoteId !== null) { // Only update if a note is active
                const contentToRender = editor.value; // Get current editor content
                try {
                    preview.innerHTML = marked.parse(contentToRender); // Parse and set HTML
                    // Add checkbox functionality after render (needs revisiting if checkboxes become interactive)
                    // preview.querySelectorAll('.task-list-item input[type="checkbox"]').forEach(checkbox => { checkbox.disabled = false; /* Or add event listeners */ });
                } catch(e){
                    console.error("Markdown Parsing Error:", e);
                    preview.innerHTML = "<p>Error parsing Markdown.</p>"; // Show error in preview
                }
            } else {
                preview.innerHTML = ''; // Clear preview if no note is active
            }
        }

        /**
         * Updates the status bar with the current word and character counts from the editor.
         */
        function updateStatusBar() {
            const content = editor.value;
            const charCount = content.length;
            // Basic word count: split by whitespace, filter empty strings
            const wordCount = content.trim().split(/\s+/).filter(word => word.length > 0).length;
            charCountSpan.textContent = t('status.chars') + ': ' + charCount;
            wordCountSpan.textContent = t('status.words') + ': ' + wordCount;
        }

        /**
         * Sets the unsavedChanges flag and optionally updates the note's timestamp.
         * @param {boolean} hasUnsaved - Whether there are unsaved changes.
         * @param {boolean} [updateTimestamp=true] - Whether to update the note's updatedAt timestamp.
         */
        function setUnsavedChanges(hasUnsaved, updateTimestamp = true) {
             if (unsavedChanges !== hasUnsaved) {
                 unsavedChanges = hasUnsaved;
                 // Potentially update window title or show indicator later
             }
             // Update timestamp if changes occurred and enough time passed since last update
             if (hasUnsaved && updateTimestamp && activeNoteId) {
                 const note = findNoteById(activeNoteId);
                 // Avoid excessive timestamp updates during rapid typing
                 if (note && (!note.updatedAt || Date.now() - note.updatedAt > 500)) {
                     note.updatedAt = Date.now();
                 }
             }
        }


        // --- Sorting Logic ---

        /**
         * Sorts an array of notes based on the specified sort order.
         * @param {Array<object>} notesToSort - The array of note objects to sort.
         * @param {string} sortOrder - The sorting criteria (e.g., 'modified-desc', 'name-asc').
         * @returns {Array<object>} A new array containing the sorted notes.
         */
        function sortNotes(notesToSort, sortOrder) {
            const sorted = notesToSort.slice(); // Create a copy to avoid modifying the original array
            sorted.sort((a, b) => {
                // Get values for comparison, providing defaults for potentially missing properties
                const aName = a.name || '';
                const bName = b.name || '';
                const aCreated = a.createdAt || 0;
                const bCreated = b.createdAt || 0;
                const aUpdated = a.updatedAt || 0;
                const bUpdated = b.updatedAt || 0;

                switch (sortOrder) {
                    case 'name-asc': return aName.localeCompare(bName); // Alphabetical A-Z
                    case 'name-desc': return bName.localeCompare(aName); // Alphabetical Z-A
                    case 'created-asc': return aCreated - bCreated; // Oldest created first
                    case 'created-desc': return bCreated - aCreated; // Newest created first
                    case 'modified-asc': return aUpdated - bUpdated; // Oldest modified first
                    case 'modified-desc': // Default case
                    default: return bUpdated - aUpdated; // Newest modified first
                }
            });
            return sorted;
        }

         // --- Tagging Logic ---

         /**
          * Extracts tags (like #tag) from a string of content.
          * @param {string} content - The text content to search for tags.
          * @returns {Array<string>} An array of unique tags found (lowercase, without the '#').
          */
         function extractTags(content) {
             // Regex: finds '#' followed by one or more letters, numbers, underscore, hyphen, or forward slash
             const tagRegex = /#([a-zA-Z0-9_\-\/]+)/g;
             const matches = content.matchAll(tagRegex); // Use matchAll for iterator
             const tags = new Set(); // Use Set to automatically handle duplicates
             for (const match of matches) {
                 tags.add(match[1].toLowerCase()); // Add the captured group (tag name) in lowercase
             }
             return Array.from(tags); // Convert Set back to Array
         }

         /**
          * Extracts tags from all notes (or current editor content for the active note)
          * and renders the tag buttons in the sidebar tag list.
          */
         function extractAndRenderTags() {
             try {
                 const allTags = new Set();
                 // Iterate through all notes
                 notes.forEach(note => {
                     // Use editor content if it's the active note, otherwise use stored content
                     const content = (note.id === activeNoteId && editor) ? editor.value : note.content;
                     if(typeof content === 'string'){ // Ensure content is a string before processing
                         const tags = extractTags(content);
                         tags.forEach(tag => allTags.add(tag)); // Add note's tags to the global set
                     }
                 });

                 // Sort tags alphabetically
                 const sortedTags = Array.from(allTags).sort((a, b) => a.localeCompare(b));

                 tagListContainer.innerHTML = ''; // Clear previous tags

                 if (sortedTags.length === 0) {
                     // Display message if no tags are found
                     tagListContainer.innerHTML = '<span style="font-size: 11px; color: #666;">No tags found.</span>';
                 } else {
                     // Create and append a button for each tag
                     sortedTags.forEach(tag => {
                         const tagButton = document.createElement('button');
                         tagButton.className = 'tag-button';
                         tagButton.textContent = `#${tag}`; // Display tag with '#'
                         tagButton.dataset.tag = tag; // Store tag name (without '#') in data attribute

                         // Highlight the button if it's the currently active filter
                         if (tag === activeFilterTag) {
                             tagButton.classList.add('active-tag');
                         }

                         // Add click listener to filter by this tag or clear filter if already active
                         tagButton.addEventListener('click', () => {
                             if (activeFilterTag === tag) {
                                 clearTagFilter(); // Clicking active tag clears the filter
                             } else {
                                 setTagFilter(tag); // Clicking inactive tag sets the filter
                             }
                         });
                         tagListContainer.appendChild(tagButton);
                     });
                 }
                 // Show or hide the "Clear" button based on whether a filter is active
                 clearTagFilterBtn.style.display = activeFilterTag ? 'inline' : 'none';
             } catch (e) {
                 console.error("Error rendering tags:", e);
                 tagListContainer.innerHTML = '<span style="font-size: 11px; color: red;">Error loading tags.</span>';
             }
         }

         /**
          * Sets the active tag filter and re-renders the sidebar note list and tags.
          * @param {string} tag - The tag to filter by.
          */
         function setTagFilter(tag) {
             activeFilterTag = tag;
             renderSidebarNoteList(); // Update note list based on filter
             extractAndRenderTags(); // Re-render tags to highlight the active one
         }

         /**
          * Clears the active tag filter and re-renders the sidebar note list and tags.
          */
         function clearTagFilter() {
             activeFilterTag = null;
             renderSidebarNoteList(); // Update note list to show all (or sorted) notes
             extractAndRenderTags(); // Re-render tags with none highlighted
         }

        // --- UI Rendering Functions ---

        /**
         * Renders the tabs in the tab bar based on the `notes` array.
         * Ensures the active tab is visible.
         */
        function renderTabs() {
            try {
                // Clear existing tabs before rendering
                tabsContainer.querySelectorAll('.tab').forEach(tab => tab.remove());

                // Sort notes for tab display: Pinned notes first, then by last active/order? (Currently just pinned first)
                 // Simple sort: Pinned first, rest maintain relative order (can be enhanced)
                const sortedForTabs = notes.slice().sort((a, b) => (b.isPinned - a.isPinned)); // Pinned first

                // Create and append a tab element for each note
                sortedForTabs.forEach(note => {
                    const tab = document.createElement('button');
                    tab.className = 'tab';
                    tab.dataset.id = note.id; // Store note ID for switching

                    // Span for the note name (allows ellipsis)
                    const tabNameSpan = document.createElement('span');
                    tabNameSpan.className = 'tab-name';
                    tabNameSpan.textContent = note.name;
                    tabNameSpan.title = note.name; // Show full name on hover

                    // Span for the close button ('x')
                    const closeBtnSpan = document.createElement('span');
                    closeBtnSpan.className = 'close-tab-btn';
                    const closeIcon = document.createElement('i');
                    closeIcon.setAttribute('data-lucide', 'x');
                    closeBtnSpan.appendChild(closeIcon);
                    closeBtnSpan.title = 'Close Note';
                    closeBtnSpan.dataset.id = note.id; // Store ID for closing

                    tab.appendChild(tabNameSpan);
                    tab.appendChild(closeBtnSpan);

                    // Add 'active' class if this note is the active one
                    if (note.id === activeNoteId) {
                        tab.classList.add('active');
                    }

                    // Click listener for the tab (switch note) - ignores clicks on close button
                    tab.addEventListener('click', (e) => {
                        if (closeBtnSpan !== e.target && !closeBtnSpan.contains(e.target)) { // Only switch if tab area (not 'x') is clicked
                            switchTab(Number(tab.dataset.id));
                        }
                    });

                    // Click listener for the close button (close note)
                    closeBtnSpan.addEventListener('click', (e) => {
                        e.stopPropagation(); // Prevent tab click event from firing
                        closeNoteById(Number(closeBtnSpan.dataset.id));
                    });

                    // Insert the new tab before the '+' button
                    tabsContainer.insertBefore(tab, addTabBtn);
                });

                // Scroll the active tab into view if necessary
                const activeTabElement = tabsContainer.querySelector('.tab.active');
                if (activeTabElement) {
                    activeTabElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }

                if (typeof lucide !== 'undefined') {
                    lucide.createIcons({}, tabsContainer);
                }
            } catch(e){
                console.error("Error rendering tabs:", e);
                // Handle or display error appropriately
            }
        }

        /**
         * Renders the options in the note switcher dropdown based on the `notes` array.
         */
        function renderSwitcher() {
            try {
                noteSwitcher.innerHTML = ''; // Clear previous options
                notes.forEach(note => {
                    const option = document.createElement('option');
                    option.value = note.id;
                    option.textContent = note.name;
                    // Select the option corresponding to the active note
                    if (note.id === activeNoteId) {
                        option.selected = true;
                    }
                    noteSwitcher.appendChild(option);
                });
                // Disable switcher if there are no notes
                noteSwitcher.disabled = notes.length === 0;
            } catch(e){
                console.error("Error rendering switcher:", e);
            }
        }

        /**
         * Renders the list of notes in the sidebar based on filters, sorting, and pinning.
         */
        function renderSidebarNoteList() {
            try {
                let notesToDisplay = notes;

                // Apply tag filter if one is active
                if (activeFilterTag) {
                    // Create a regex to match the tag (case-insensitive, ensures it's a whole tag)
                    const filterRegex = new RegExp(`#${escapeRegExp(activeFilterTag)}(?:\\s|$)`, 'i');
                    notesToDisplay = notes.filter(note => {
                        // Use editor content for active note, stored content otherwise
                        const content = (note.id === activeNoteId && editor) ? editor.value : note.content;
                        // Ensure content is string and test against regex
                        return typeof content === 'string' && filterRegex.test(content);
                    });
                }

                // Separate pinned and unpinned notes
                const pinnedNotes = notesToDisplay.filter(n => n.isPinned);
                const unpinnedNotes = notesToDisplay.filter(n => !n.isPinned);

                // Sort pinned and unpinned lists separately based on current sort order
                const sortedPinned = sortNotes(pinnedNotes, currentSortOrder);
                const sortedUnpinned = sortNotes(unpinnedNotes, currentSortOrder);

                // Combine lists: pinned first, then unpinned
                const finalSortedNotes = [...sortedPinned, ...sortedUnpinned];

                sidebarNoteList.innerHTML = ''; // Clear previous list items

                // Create and append list items for each note in the final sorted list
                finalSortedNotes.forEach(note => {
                    const listItem = document.createElement('li');
                    listItem.className = 'sidebar-note-item';
                    listItem.dataset.id = note.id; // Store note ID

                    // Highlight if it's the active note
                    if (note.id === activeNoteId) {
                        listItem.classList.add('active-note-sidebar');
                    }

                    // Span for the note name (allows ellipsis)
                    const noteNameSpan = document.createElement('span');
                    noteNameSpan.className = 'note-name-sidebar';
                    noteNameSpan.textContent = note.name;
                    noteNameSpan.title = note.name; // Show full name on hover

                    // Button for pinning/unpinning
                    const pinButton = document.createElement('button');
                    pinButton.className = 'pin-note-btn';
                    const pinIcon = document.createElement('i');
                    pinIcon.setAttribute('data-lucide', note.isPinned ? 'pin' : 'pin-off');
                    pinButton.appendChild(pinIcon);
                    pinButton.title = note.isPinned ? 'Unpin Note' : 'Pin Note'; // Dynamic title
                    if (note.isPinned) {
                        pinButton.classList.add('pinned'); // Add class if pinned for styling
                    }
                    pinButton.dataset.id = note.id; // Store note ID

                    // Click listener for pin button
                    pinButton.addEventListener('click', (e) => {
                        e.stopPropagation(); // Prevent list item click event
                        togglePinNote(Number(pinButton.dataset.id));
                    });

                    // Click listener for list item (switch note) - ignores clicks on pin button
                    listItem.addEventListener('click', (e) => {
                        if (pinButton !== e.target && !pinButton.contains(e.target)) { // Only switch if item area (not pin) is clicked
                            switchTab(Number(listItem.dataset.id));
                        }
                    });

                    listItem.appendChild(noteNameSpan);
                    listItem.appendChild(pinButton);
                    sidebarNoteList.appendChild(listItem);
                });

                if (typeof lucide !== 'undefined') {
                    lucide.createIcons({}, sidebarNoteList);
                }
            } catch (e) {
                console.error("Error rendering sidebar note list:", e);
                sidebarNoteList.innerHTML = '<li>Error loading notes list.</li>'; // Display error in list
            }
        }

        /**
         * Calls all necessary rendering functions to update the entire UI.
         * Includes error handling for each sub-render function.
         */
        function renderUI() {
            // Render each part of the UI, catching potential errors individually
            try { renderTabs(); } catch(e){ console.error("Error in renderTabs:", e); }
            try { renderSwitcher(); } catch(e){ console.error("Error in renderSwitcher:", e); }
            try { renderSidebarNoteList(); } catch(e){ console.error("Error in renderSidebarNoteList:", e); }
            try { extractAndRenderTags(); } catch(e){ console.error("Error in extractAndRenderTags:", e); }
            try { updateStatusBar(); } catch(e){ console.error("Error in updateStatusBar:", e); }
            // updatePreview() is usually called separately after content changes or tab switches
        }

        // --- Note Management Functions ---

        /**
         * Toggles the pinned status of a note and updates the UI.
         * @param {number} noteId - The ID of the note to pin/unpin.
         */
        function togglePinNote(noteId) {
            const note = findNoteById(noteId);
            if (note) {
                note.isPinned = !note.isPinned; // Toggle boolean flag
                note.updatedAt = Date.now(); // Update timestamp (pinning is a modification)
                setUnsavedChanges(true, false); // Mark state as changed, but don't update timestamp again
                saveStateToLocalStorage(); // Persist the change
                renderSidebarNoteList(); // Re-render sidebar to reflect pinned status and order
                // Consider re-rendering tabs if pinning should affect tab order immediately
                // renderTabs();
            }
        }

        /**
         * Switches the active tab/note to the one specified by ID.
         * Saves the content of the previous note before switching.
         * Updates editor, preview, and UI elements.
         * @param {number} id - The ID of the note to switch to.
         */
        function switchTab(id) {
            const numericId = Number(id);
            // Don't switch if it's already the active note
            if (activeNoteId === numericId && findNoteById(numericId)) return;

            // Save content of the currently active note (if any) before switching
            const currentActiveNote = findNoteById(activeNoteId);
            if (currentActiveNote) {
                // Check if content actually changed before saving
                if (currentActiveNote.content !== editor.value) {
                    currentActiveNote.content = editor.value;
                    currentActiveNote.updatedAt = Date.now();
                    setUnsavedChanges(true, false); // Mark state changed
                }
            }

            // Update activeNoteId
            activeNoteId = numericId;
            const note = findNoteById(numericId);

            if (note) {
                // Load the new note's content into the editor
                editor.value = note.content;
                updatePreview(); // Update the preview pane
                renderUI(); // Update tabs, switcher, sidebar highlighting
                editor.focus(); // Set focus to the editor
                setUnsavedChanges(false); // Reset unsaved flag for the newly loaded note
                hideFindReplace(); // Hide find/replace bar when switching notes
            } else {
                // If the target note ID doesn't exist (e.g., was deleted), switch to the first available note or clear editor
                console.warn(`Switched to non-existent note ID: ${numericId}. Finding fallback.`);
                activeNoteId = null; // Temporarily set to null
                if (notes.length > 0) {
                    // Find the first note (respecting potential sorting/pinning later if needed)
                    const fallbackNote = notes[0]; // Simple fallback to the first note
                    if (fallbackNote) {
                      switchTab(fallbackNote.id); // Recursively call switchTab with a valid ID
                      return; // Exit current execution path
                    }
                }
                // If no notes are left, clear everything
                editor.value = '';
                updatePreview();
                renderUI();
                setUnsavedChanges(false);
                hideFindReplace();

            }

            closeMenuDropdown(); // Close menu if open
            saveStateToLocalStorage(); // Persist the new active note ID and any saved content
        }


        /**
         * Adds a new note to the `notes` array and switches to it.
         * Generates a unique name if none is provided.
         * @param {string|null} [name=null] - The desired name for the note. If null, generates "Untitled X".
         * @param {string} [content=''] - The initial content for the note.
         * @returns {number} The ID of the newly created note.
         */
        function addNote(name = null, content = '') {
            const now = Date.now(); // Use timestamp for unique ID and creation/update times
            const newId = now;
            let noteName = name;

            // Generate "Untitled X" name if no name provided
            if (!noteName) {
                let nextNum = 1;
                // Find the highest existing "Untitled" number to avoid reuse
                notes.forEach(n => {
                    const match = n.name.match(/^Untitled\s*(\d+)$/i); // Match "Untitled" followed by optional space and digits
                    if (match && parseInt(match[1], 10) >= nextNum) {
                        nextNum = parseInt(match[1], 10) + 1;
                    }
                });
                 // Ensure the global counter is at least the next available number
                 untitledCounter = Math.max(untitledCounter, nextNum);
                 noteName = `Untitled ${untitledCounter++}`; // Use and increment counter
            }

            // Create the new note object
            const newNote = {
                id: newId,
                name: noteName,
                content: content,
                isPinned: false, // New notes are not pinned by default
                createdAt: now,
                updatedAt: now
            };

            notes.push(newNote); // Add to the main notes array
            setUnsavedChanges(true, false); // Mark state as changed
            hideFindReplace(); // Hide find/replace bar
            switchTab(newId); // Make the new note active
            // Don't save state here, let switchTab handle it

            return newId; // Return the ID of the new note
        }

        /**
         * Prompts the user to rename the currently active note.
         * Updates the note object and UI.
         */
        function renameNote() {
            if (!activeNoteId) {
                alert("Please select a note to rename.");
                return;
            }
            const note = findNoteById(activeNoteId);
            if (!note) return; // Should not happen if activeNoteId is valid

            const oldName = note.name;
            const newName = prompt("Enter the new name for the note:", oldName);

            // If user cancelled, entered empty name, or didn't change the name, do nothing
            if (newName === null || newName.trim() === '' || newName.trim() === oldName) {
                closeMenuDropdown();
                return;
            }

            note.name = newName.trim(); // Update note name (remove leading/trailing whitespace)
            note.updatedAt = Date.now(); // Update timestamp
            setUnsavedChanges(true, false); // Mark state changed
            renderUI(); // Update tabs, switcher, sidebar
            closeMenuDropdown();
            saveStateToLocalStorage(); // Persist the name change
        }

        /**
         * Closes a specific note by its ID. Removes it from the `notes` array,
         * updates the UI, and switches to another note if the closed one was active.
         * @param {number} idToClose - The ID of the note to close.
         */
        function closeNoteById(idToClose) {
             const numericIdToClose = Number(idToClose);
             if (notes.length <= 0) return; // Cannot close if no notes exist

             const indexToClose = findNoteIndexById(numericIdToClose);
             if (indexToClose === -1) {
                 console.error("Cannot close note: ID not found", numericIdToClose);
                 return;
             }

             const wasActive = (numericIdToClose === activeNoteId); // Check if the closed note was the active one

             // Remove the note from the array
             notes.splice(indexToClose, 1);
             setUnsavedChanges(true); // Mark state changed (note removal)

             if (notes.length === 0) {
                 // If no notes are left, clear editor and reset state
                 editor.value = '';
                 preview.innerHTML = '';
                 activeNoteId = null;
                 untitledCounter = 1; // Reset counter when all notes are closed
                 renderUI();
                 saveStateToLocalStorage();
                 setUnsavedChanges(false); // No unsaved changes when editor is empty
                 hideFindReplace();
             } else if (wasActive) {
                 // If the closed note was active, switch to another note
                 // Try to switch to the previous note in the list, or the first note if closing the first one
                 const nextIndex = Math.max(0, indexToClose - 1);
                 const nextActiveId = notes[nextIndex] ? notes[nextIndex].id : notes[0].id; // Fallback to first note
                 activeNoteId = null; // Important: Set activeNoteId to null *before* calling switchTab
                                      // to prevent switchTab from saving the closed note's (now empty) content.
                 switchTab(nextActiveId); // Let switchTab handle UI update and saving state
             } else {
                 // If a non-active note was closed, just re-render the UI and save state
                 renderUI();
                 saveStateToLocalStorage();
             }

             closeSearchResults(); // Close search results if open
             closeMenuDropdown(); // Close menu if open
         }

        /**
         * Closes the currently active note. If no note is active but notes exist, closes the first one.
         */
        function closeNote() {
            if (activeNoteId !== null) {
                closeNoteById(activeNoteId);
            } else if (notes.length > 0) {
                // If somehow no note is active, close the first one in the list
                closeNoteById(notes[0].id);
            }
        }

        /**
         * Saves the content of the currently active note to a Markdown file via browser download.
         */
        async function saveNote() {
            if (!activeNoteId) {
                alert("Please select a note to save.");
                return;
            }
            const note = findNoteById(activeNoteId);
            if (!note) return;

            note.content = editor.value;
            note.updatedAt = Date.now();

            let filename = note.name;
            if (!/\.(md|txt)$/i.test(filename)) {
                filename += '.md';
            }

            try {
                const savePath = await save({
                    defaultPath: filename,
                    filters: [{ name: 'Markdown', extensions: ['md', 'txt'] }]
                });
                if (savePath) {
                    await invoke('fn_write_file', { path: savePath, content: note.content });
                    setUnsavedChanges(false);
                    closeMenuDropdown();
                    saveStateToLocalStorage();
                } else {
                    closeMenuDropdown();
                }
            } catch (e) {
                console.error("Error saving file:", e);
                alert("Error saving file: " + e);
            }
        }


        // --- Import / Export ---

        /**
         * Triggers the hidden file input to allow importing multiple Markdown/text files.
         */
        async function importFiles() {
            closeMenuDropdown();
            try {
                const selected = await open({
                    multiple: true,
                    filters: [{ name: 'Markdown/Text', extensions: ['md', 'txt'] }]
                });
                if (!selected || selected.length === 0) return;

                firstAddedNoteIdDuringImport = null;
                setUnsavedChanges(true);

                const paths = selected;
                for (let i = 0; i < paths.length; i++) {
                    const path = paths[i];
                    const name = path.split('\\').pop().split('/').pop();
                    const content = await invoke('fn_read_file', { path });

                    const existingNote = notes.find(n => n.name === name);
                    if (existingNote) {
                        if (paths.length === 1 && await ask(`A note named "${name}" is already open. Replace its content?`, { title: 'Replace?', kind: 'warning' })) {
                            existingNote.content = content;
                            existingNote.updatedAt = Date.now();
                            if (existingNote.id === activeNoteId) {
                                editor.value = content;
                                updatePreview();
                            } else {
                                renderUI();
                            }
                        } else {
                            const copyName = name.replace(/(\.[^.]*)?$/i, ' (copy)$1');
                            const addedId = addNote(copyName, content);
                            if (firstAddedNoteIdDuringImport === null) {
                                firstAddedNoteIdDuringImport = addedId;
                            }
                        }
                    } else {
                        const addedId = addNote(name, content);
                        if (firstAddedNoteIdDuringImport === null) {
                            firstAddedNoteIdDuringImport = addedId;
                        }
                    }
                }

                if (firstAddedNoteIdDuringImport !== null && findNoteById(firstAddedNoteIdDuringImport)) {
                    switchTab(firstAddedNoteIdDuringImport);
                } else {
                    renderUI();
                    saveStateToLocalStorage();
                }
            } catch (e) {
                console.error("Error importing files:", e);
                alert("Error importing files: " + e);
            }
        }

        /**
         * Triggers the hidden file input to allow opening a single Markdown/text file.
         * (Used by the 'Open File...' button).
         */
        async function openSingleFile() {
            closeMenuDropdown();
            try {
                const selected = await open({
                    multiple: false,
                    filters: [{ name: 'Markdown/Text', extensions: ['md', 'txt'] }]
                });
                if (!selected) return;

                const path = selected;
                const name = path.split('\\').pop().split('/').pop();
                const content = await invoke('fn_read_file', { path });

                const existingNote = notes.find(n => n.name === name);
                if (existingNote) {
                    existingNote.content = content;
                    existingNote.updatedAt = Date.now();
                    if (existingNote.id === activeNoteId) {
                        editor.value = content;
                        updatePreview();
                    } else {
                        renderUI();
                    }
                } else {
                    const id = addNote(name, content);
                    const newNote = findNoteById(id);
                    if (newNote) newNote.updatedAt = Date.now();
                }
                saveStateToLocalStorage();
            } catch (e) {
                console.error("Error opening file:", e);
                alert("Error opening file: " + e);
            }
        }

        /**
         * Handles the 'change' event of the hidden file input. Reads selected files
         * as text and adds them as new notes or prompts to replace existing ones.

        // ---- handleFileOpen removed - using Tauri dialog instead ----

        /**
         * Recursively processes files within a directory handle obtained from showDirectoryPicker.
         * Adds valid markdown/text files as notes.
         * @param {FileSystemDirectoryHandle} directoryHandle - The handle to the directory.
         */
        async function importFolder() {
            closeMenuDropdown();
            try {
                const selected = await open({ directory: true });
                if (!selected) return;

                const folderPath = selected;
                firstAddedNoteIdDuringImport = null;
                setUnsavedChanges(true);

                const entries = await invoke('fn_import_folder', { path: folderPath });

                for (const entry of entries) {
                    const existingNote = notes.find(n => n.name === entry.name);
                    if (existingNote) {
                        const copyName = entry.name.replace(/(\.[^.]*)?$/i, ' (copy)$1');
                        const addedId = addNote(copyName, entry.content);
                        if (firstAddedNoteIdDuringImport === null) {
                            firstAddedNoteIdDuringImport = addedId;
                        }
                    } else {
                        const addedId = addNote(entry.name, entry.content);
                        if (firstAddedNoteIdDuringImport === null) {
                            firstAddedNoteIdDuringImport = addedId;
                        }
                    }
                }

                if (firstAddedNoteIdDuringImport !== null && findNoteById(firstAddedNoteIdDuringImport)) {
                    switchTab(firstAddedNoteIdDuringImport);
                } else {
                    renderUI();
                    saveStateToLocalStorage();
                }
            } catch (e) {
                console.error("Error importing folder:", e);
                alert("Error importing folder: " + e);
            }
        }

        /**
         * Exports all current notes into a single ZIP archive using JSZip.
         * Prompts the user to download the generated ZIP file.
         */
        async function exportAllNotes() {
            if (notes.length === 0) {
                alert("No notes to export.");
                return;
            }
            closeMenuDropdown();

            const currentNote = findNoteById(activeNoteId);
            if (currentNote) {
                currentNote.content = editor.value;
            }

            try {
                const savePath = await save({
                    defaultPath: "markdown_notes.zip",
                    filters: [{ name: 'ZIP Archive', extensions: ['zip'] }]
                });
                if (!savePath) return;

                const exportNotes = notes.map(n => ({
                    name: n.name,
                    content: n.content
                }));

                await invoke('fn_export_zip', { notes: exportNotes, savePath });
                setUnsavedChanges(false);
                saveStateToLocalStorage();
            } catch (e) {
                console.error("Error exporting zip:", e);
                alert("Error exporting zip: " + e);
            }

        // --- Mode (Editor/Viewer) Logic ---

        let savedEditorPercent = 50;

        function applyMode(mode) {
            currentMode = mode;
            viewerModeBtn.classList.toggle('active', mode === 'viewer');
            editorModeBtn.classList.toggle('active', mode === 'editor');
            if (mode === 'viewer') {
                savedEditorPercent = parseFloat(editorContainer.style.flexBasis) || 50;
                editor.readOnly = true;
                document.body.classList.add('viewer-mode');
                editorContainer.style.display = 'none';
                resizer.style.display = 'none';
                preview.style.flexBasis = '100%';
                hideFindReplace();
                closeSearchResults();
            } else {
                editor.readOnly = false;
                document.body.classList.remove('viewer-mode');
                editorContainer.style.display = '';
                resizer.style.display = '';
                const rw = resizer.offsetWidth;
                const cw = container.offsetWidth;
                const rp = (rw / cw) * 100 || 0.5;
                editorContainer.style.flexBasis = `${savedEditorPercent}%`;
                preview.style.flexBasis = `${100 - savedEditorPercent - rp}%`;
            }
        }

        function parseConfigValue(content, key, defaultValue) {
            const match = content.match(new RegExp(`^${key}=(\\S+)`, 'm'));
            return match ? match[1].toLowerCase() : defaultValue;
        }

        function parseConfigStartupType(content) {
            const val = parseConfigValue(content, 'StartupType', 'viewer');
            return val === 'editor' ? 'editor' : 'viewer';
        }

        function parseConfigLanguage(content) {
            return parseConfigValue(content, 'Language', 'english');
        }

        async function loadAndApplyMode() {
            try {
                const configContent = await invoke('fn_read_config');
                const mode = parseConfigStartupType(configContent);
                applyMode(mode);
            } catch (e) {
                console.error("Error loading config:", e);
                applyMode('viewer');
            }
        }

        async function saveConfig(startupType, language) {
            try {
                const content = `[General]\nStartupType=${startupType}\nLanguage=${language}\n`;
                await invoke('fn_write_config', { content });
            } catch (e) {
                console.error("Error saving config:", e);
            }
        }

        async function readConfig() {
            try {
                return await invoke('fn_read_config');
            } catch (e) {
                console.error("Error reading config:", e);
                return '';
            }
        }

        /**
         * Escapes special regular expression characters in a string.
         * @param {string} string - The string to escape.
         * @returns {string} The escaped string, safe for use in a RegExp constructor.
         */
        function escapeRegExp(string) {
            // $& means the whole matched string
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        /**
         * Performs a search across all notes based on the query in the search input.
         * Displays the results in the search results overlay.
         */
        function performSearch() {
            const query = searchInput.value.trim(); // Get search term, remove whitespace

            // If query is empty, show message and stop
            if (!query) {
                searchResultsContent.innerHTML = '<p>' + t('search.no_term') + '</p>';
                searchResults.style.display = 'block';
                return;
            }

            // Save current editor content to the active note object before searching
             const currentActiveNote = findNoteById(activeNoteId);
             if (currentActiveNote) {
                 currentActiveNote.content = editor.value;
             }

            const queryLower = query.toLowerCase(); // For case-insensitive basic search
            const queryRegex = new RegExp(escapeRegExp(query), 'gi'); // Case-insensitive regex for highlighting
            let resultsHTML = ''; // String to build HTML for results
            let resultsCount = 0; // Counter for found results
            const snippetLength = 80; // Max characters before/after match for snippet

            // Iterate through all notes
            notes.forEach(note => {
                const content = note.content;
                const contentLower = content.toLowerCase(); // For finding match index

                // Find the first occurrence of the query (case-insensitive)
                let matchIndex = contentLower.indexOf(queryLower);

                if (matchIndex !== -1) { // If found
                    resultsCount++;

                    // Calculate start/end indices for the snippet around the match
                    const startIndex = Math.max(0, matchIndex - snippetLength);
                    const endIndex = Math.min(content.length, matchIndex + query.length + snippetLength);

                    // Extract snippet
                    let snippet = content.substring(startIndex, endIndex);

                    // Add ellipsis if snippet doesn't start/end at the beginning/end of content
                    if (startIndex > 0) snippet = '...' + snippet;
                    if (endIndex < content.length) snippet = snippet + '...';

                    // Highlight all occurrences of the query within the snippet using the regex
                    const highlightedSnippet = snippet.replace(queryRegex, match => `<mark>${match}</mark>`);

                    // Build HTML for this result item
                    resultsHTML += `
                        <div class="search-result-item" data-note-id="${note.id}">
                            <div class="search-result-name">${note.name}</div>
                            <div class="search-result-snippet">${highlightedSnippet}</div>
                        </div>`;
                }
            });

            // Display results or "No results" message
            if (resultsCount > 0) {
                searchResultsContent.innerHTML = resultsHTML;
            } else {
                searchResultsContent.innerHTML = '<p>No results found.</p>';
            }
            searchResults.style.display = 'block'; // Show the results overlay
            closeMenuDropdown(); // Close menu if open
        }
