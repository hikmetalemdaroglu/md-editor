        // --- Resizer Logic ---
        // Variables to track dragging state
        let startX, startWidthEditorPercent;

        /**
         * Initializes the dragging process when the resizer is clicked.
         * Records starting position and width, adds global mouse listeners.
         * @param {MouseEvent} e - The mousedown event.
         */
        function startDrag(e) {
            isResizing = true;
            startX = e.clientX; // Record starting mouse X position
            const editorWidth = editorContainer.offsetWidth; // Get current editor width
            const containerWidth = container.offsetWidth; // Get total container width
             // Calculate editor width as percentage (more robust for resize)
            startWidthEditorPercent = (editorWidth / containerWidth) * 100;

            // Add listeners to the document to track mouse movement and release globally
            document.addEventListener('mousemove', handleDrag);
            document.addEventListener('mouseup', stopDrag);

            // Prevent text selection during drag
            document.body.style.userSelect = 'none';
            document.body.style.webkitUserSelect = 'none';
            document.body.style.msUserSelect = 'none';
        }

        /**
         * Handles mouse movement during resizing. Calculates new widths for
         * editor and preview panes based on mouse delta and updates their flex-basis.
         * @param {MouseEvent} e - The mousemove event.
         */
        function handleDrag(e) {
            if (!isResizing) return; // Only run if dragging is active

            const dx = e.clientX - startX; // Calculate horizontal mouse movement delta
            const containerWidth = container.offsetWidth; // Get current total width
            const resizerWidth = resizer.offsetWidth; // Get resizer width

            // Calculate new editor width percentage based on delta
            let newEditorPercent = startWidthEditorPercent + (dx / containerWidth * 100);

            // Enforce minimum width (e.g., 100px) converted to percentage
            const minWidthPx = 100;
            const minWidthPercent = (minWidthPx / containerWidth) * 100;

            // Clamp editor width to minimum
            if (newEditorPercent < minWidthPercent) {
                newEditorPercent = minWidthPercent;
            }

            // Calculate corresponding preview width percentage
            // Subtract editor % and resizer % (converted from px) from 100%
            let newPreviewPercent = 100 - newEditorPercent - (resizerWidth / containerWidth * 100);

            // Clamp preview width to minimum, adjust editor width accordingly if needed
            if (newPreviewPercent < minWidthPercent) {
                newPreviewPercent = minWidthPercent;
                // Recalculate editor % if preview hits minimum
                newEditorPercent = 100 - newPreviewPercent - (resizerWidth / containerWidth * 100);
            }

            // Apply the new widths using flex-basis
            editorContainer.style.flexBasis = `${newEditorPercent}%`;
            preview.style.flexBasis = `${newPreviewPercent}%`;

            e.preventDefault(); // Prevent default drag behavior (like text selection)
        }

        /**
         * Finalizes the dragging process on mouse up. Removes global listeners
         * and saves the final pane sizes to local storage.
         * @param {MouseEvent} e - The mouseup event.
         */
        function stopDrag(e) {
            if (isResizing) {
                isResizing = false;
                // Remove the global listeners
                document.removeEventListener('mousemove', handleDrag);
                document.removeEventListener('mouseup', stopDrag);

                // Restore text selection ability
                document.body.style.userSelect = '';
                document.body.style.webkitUserSelect = '';
                document.body.style.msUserSelect = '';

                // Persist the final editor pane percentage
                saveStateToLocalStorage();
            }
        }

        // --- Markdown Toolbar Logic ---

        /**
         * Applies Markdown formatting syntax around the selected text in the editor,
         * or inserts the syntax with a placeholder if no text is selected.
         * @param {string} syntaxStart - The Markdown syntax to add before the selection (e.g., '**', '# ').
         * @param {string|null} [syntaxEnd=null] - The syntax to add after the selection (e.g., '**'). If null, uses syntaxStart.
         * @param {string} [placeholder='text'] - Placeholder text to insert if nothing is selected.
         * @param {boolean} [isBlock=false] - If true, ensures the syntax starts on a new line. Special handling for '---'.
         */
        function applyMarkdownFormatting(syntaxStart, syntaxEnd = null, placeholder = 'text', isBlock = false) {
            const start = editor.selectionStart; // Start position of selection
            const end = editor.selectionEnd; // End position of selection
            const selectedText = editor.value.substring(start, end); // The actual selected text

            let textToInsert = '';
            let finalSelectionStart = start; // Will be updated to place cursor/selection correctly
            let finalSelectionEnd = end;

            // If syntaxEnd is not provided, assume it's the same as syntaxStart (e.g., for *, **, `)
            syntaxEnd = syntaxEnd ?? syntaxStart;

            let prefix = ''; // Characters to add before the start syntax (e.g., newline)
            let suffix = ''; // Characters to add after the end syntax (rarely needed)

            // Ensure block elements (like headings, lists, hr, blockquote) start on a new line
            if (isBlock && start !== 0 && editor.value[start - 1] !== '\n') {
                 prefix = '\n'; // Add a newline if not already at the start of a line
            }

            // Special handling for Horizontal Rule (---)
             if (syntaxStart === '---') {
                 // Ensure HR is on its own line, potentially surrounded by blank lines
                 prefix = (start !== 0 && editor.value[start - 1] !== '\n') ? '\n\n' // Needs two newlines if previous char exists and isn't newline
                       : (start !== 0 && editor.value[start-1] === '\n' ? '\n'      // Needs one newline if previous char is newline
                       : '');                                                         // Needs no newline if at start of editor
                 syntaxStart = `${prefix}---\n`; // Add prefix and required newline after ---
                 syntaxEnd = ''; // No ending syntax for HR
                 placeholder = ''; // No placeholder for HR
                 textToInsert = syntaxStart;
                 // Place cursor after the inserted HR
                 finalSelectionStart = start + syntaxStart.length;
                 finalSelectionEnd = finalSelectionStart;
             }
             // Handling for when text IS selected
             else if (selectedText) {
                 textToInsert = `${prefix}${syntaxStart}${selectedText}${syntaxEnd}${suffix}`;
                 // Place cursor after the inserted text (no selection)
                 // finalSelectionStart = start + textToInsert.length;
                 // finalSelectionEnd = finalSelectionStart;
                  // Or re-select the original text within the new syntax (usually better)
                 finalSelectionStart = start + prefix.length + syntaxStart.length;
                 finalSelectionEnd = finalSelectionStart + selectedText.length;
             }
             // Handling for when NO text is selected
             else {
                 textToInsert = `${prefix}${syntaxStart}${placeholder}${syntaxEnd}${suffix}`;
                 // Place the cursor inside the syntax, selecting the placeholder
                 finalSelectionStart = start + prefix.length + syntaxStart.length;
                 finalSelectionEnd = finalSelectionStart + placeholder.length;
             }

            // Use setRangeText for better undo/redo support than manipulating editor.value directly
            editor.setRangeText(textToInsert, start, end, 'end'); // Replace selection (or insert)

            // Adjust selection after insertion
            if (!selectedText && placeholder && syntaxStart !== '---') {
                // If no text was selected initially and we inserted a placeholder, select the placeholder
                editor.setSelectionRange(finalSelectionStart, finalSelectionEnd);
            } else if (selectedText && syntaxStart !== '---') {
                 // If text was selected, keep it selected within the new syntax
                 // This happens automatically with 'end' in setRangeText if syntaxEnd is empty,
                 // but needs explicit setting if syntaxEnd exists. Let's be explicit.
                 editor.setSelectionRange(finalSelectionStart, finalSelectionEnd);
            } else {
                 // Otherwise (like HR or after replacing selected text), just place the cursor at the end
                 editor.setSelectionRange(editor.selectionEnd, editor.selectionEnd);
            }


            editor.focus(); // Return focus to the editor
            updatePreview(); // Update the preview pane
            setUnsavedChanges(true, true); // Mark changes and update timestamp
            updateStatusBar(); // Update word/char count
        }


        // --- Find & Replace Logic ---

        /**
         * Shows the find/replace bar, focuses the find input, and performs an initial search.
         */
        function showFindReplace() {
            findReplaceBar.style.display = 'flex'; // Make the bar visible
            findInput.focus(); // Focus the 'Find' input field
            findInput.select(); // Select existing text in 'Find' input
            closeMenuDropdown(); // Close main menu if open
            findAllMatches(); // Perform initial search based on current input value
        }

        /**
         * Hides the find/replace bar and resets the find state.
         */
        function hideFindReplace() {
            findReplaceBar.style.display = 'none'; // Hide the bar
            // Reset find state
            findState = { query: '', matches: [], currentIndex: -1 };
            findMatchCount.textContent = ''; // Clear match count display
            // Consider removing highlights from editor if any were applied
        }

        /**
         * Finds all occurrences of the text in the find input within the editor's content.
         * Updates the `findState` object with match indices and lengths.
         */
        function findAllMatches() {
            const query = findInput.value;
            // If query is empty, clear matches and stop
            if (!query) {
                findState.matches = [];
                findState.currentIndex = -1;
                findMatchCount.textContent = ''; // Clear count display
                // Remove selection/highlight in editor if needed
                editor.setSelectionRange(editor.selectionStart, editor.selectionStart);
                return;
            }

            findState.query = query; // Store the current query
            findState.matches = []; // Reset previous matches
            const text = editor.value; // Get editor content
            const regex = new RegExp(escapeRegExp(query), 'gi'); // Global, case-insensitive search regex
            let match;

            // Find all matches using regex.exec in a loop
            while ((match = regex.exec(text)) !== null) {
                findState.matches.push({ index: match.index, length: match[0].length });
            }

            // Reset current index (no match selected initially)
            findState.currentIndex = -1;
            updateFindMatchCount(); // Update the "X / Y" display
             // Select the first match automatically? Optional.
             // if (findState.matches.length > 0) {
             //     findNext();
             // }
        }

        /**
         * Updates the match count display (e.g., "1 / 5" or "0 / 0").
         */
        function updateFindMatchCount() {
            if (findState.matches.length > 0) {
                 // Display current index (1-based) and total count
                 const currentNum = findState.currentIndex === -1 ? 0 : findState.currentIndex + 1;
                 findMatchCount.textContent = `${currentNum} / ${findState.matches.length}`;
            } else {
                 findMatchCount.textContent = '0 / 0'; // No matches found
            }
        }

        /**
         * Selects the next match in the editor, wrapping around to the first if necessary.
         */
        function findNext() {
            // If no matches yet, try finding them first
             if (findState.matches.length === 0) {
                 findAllMatches();
                 if (findState.matches.length === 0) return; // Still no matches, do nothing
             }

            findState.currentIndex++; // Move to the next index

            // Wrap around if past the last match
            if (findState.currentIndex >= findState.matches.length) {
                findState.currentIndex = 0;
            }

            selectMatch(findState.currentIndex); // Select and scroll to the match
        }

        /**
         * Selects the previous match in the editor, wrapping around to the last if necessary.
         */
        function findPrev() {
             // If no matches yet, try finding them first
              if (findState.matches.length === 0) {
                  findAllMatches();
                  if (findState.matches.length === 0) return; // Still no matches, do nothing
              }

            findState.currentIndex--; // Move to the previous index

            // Wrap around if before the first match
            if (findState.currentIndex < 0) {
                findState.currentIndex = findState.matches.length - 1;
            }

            selectMatch(findState.currentIndex); // Select and scroll to the match
        }

        /**
         * Selects the match at the specified index in the editor and scrolls it into view.
         * @param {number} index - The index of the match in `findState.matches`.
         */
        function selectMatch(index) {
            if (index >= 0 && index < findState.matches.length) {
                const match = findState.matches[index];
                editor.focus(); // Ensure editor has focus
                // Select the matched text
                editor.setSelectionRange(match.index, match.index + match.length);
                // Scroll the selection into view (approximate calculation)
                try {
                     const lineNum = editor.value.substring(0, match.index).split('\n').length; // Line number of match start
                     const avgLineHeight = 20; // Estimate line height (could be calculated more precisely)
                     // Scroll so the line is roughly 5 lines from the top
                     editor.scrollTop = Math.max(0, (lineNum - 5) * avgLineHeight);
                } catch(e) {
                     // Ignore potential errors in scroll calculation
                      console.warn("Could not calculate scroll position for find:", e);
                }
                updateFindMatchCount(); // Update the "X / Y" display
            }
        }

        /**
         * Replaces the currently selected match (if any) with the text from the replace input.
         * Then automatically finds and selects the next match.
         */
        function replaceCurrent() {
            // Check if a match is currently selected
            if (findState.currentIndex === -1 || findState.matches.length === 0) return;

            const match = findState.matches[findState.currentIndex];
            const replacement = replaceInput.value; // Get the replacement text
            const originalStart = match.index;
            const originalLength = match.length;

            // Select the text to be replaced
            editor.setSelectionRange(originalStart, originalStart + originalLength);
            // Perform the replacement
            editor.setRangeText(replacement);

            // Replacement might change indices of subsequent matches, so re-find all
            const scrollPos = editor.scrollTop; // Preserve scroll position
            findAllMatches();

            // Try to find the index of the *next* match after the replaced position
             let nextMatchIndex = -1;
             for(let i = 0; i < findState.matches.length; i++){
                 // Find the first match whose start index is at or after the end of the replacement
                 if(findState.matches[i].index >= originalStart + replacement.length){
                     nextMatchIndex = i;
                     break;
                 }
             }

             if(nextMatchIndex !== -1){
                  // If a subsequent match exists, set current index *before* it and call findNext()
                  findState.currentIndex = nextMatchIndex -1;
                  findNext();
             } else {
                  // If no subsequent match exists, reset index and update count
                  findState.currentIndex = -1;
                  updateFindMatchCount();
             }

            editor.scrollTop = scrollPos; // Restore scroll position
            updatePreview(); // Update preview after content change
            setUnsavedChanges(true, true); // Mark changes and update timestamp
            updateStatusBar(); // Update counts
        }

        /**
         * Replaces all occurrences of the find text with the replace text in the editor.
         */
        function replaceAll() {
            const query = findInput.value;
            const replacement = replaceInput.value;
            if (!query) return; // Cannot replace empty string

            const regex = new RegExp(escapeRegExp(query), 'gi'); // Global, case-insensitive regex for replacement
            const originalValue = editor.value;
            const newValue = originalValue.replace(regex, replacement); // Perform replacement on the whole string

            // Only update if content actually changed
            if (originalValue !== newValue) {
                const scrollPos = editor.scrollTop; // Preserve scroll position
                editor.value = newValue; // Update editor content
                editor.scrollTop = scrollPos; // Restore scroll position
                updatePreview(); // Update preview
                setUnsavedChanges(true, true); // Mark changes and update timestamp
                updateStatusBar(); // Update counts
                findAllMatches(); // Re-find matches (likely none if replace was successful)
            }
        }


        // --- Editor Auto Behaviors (Auto Pair, Auto List) ---
        const pairMap = { '(': ')', '[': ']', '{': '}', '"': '"', "'": "'", '`': '`' };
        const listMarkers = ['- ', '* ', '+ ']; // Common markdown list markers

        /**
         * Handles keydown events in the editor for auto-pairing characters
         * and continuing lists on Enter.
         * @param {KeyboardEvent} event - The keydown event.
         */
        function handleEditorKeyDown(event) {
            const key = event.key;
            const start = editor.selectionStart;
            const end = editor.selectionEnd;

            // --- Auto-Pairing ---
            // If the pressed key is an opening character in our pairMap
            if (Object.keys(pairMap).includes(key)) {
                event.preventDefault(); // Prevent default character insertion
                const selectedText = editor.value.substring(start, end); // Get currently selected text
                const closingChar = pairMap[key]; // Get the corresponding closing character

                // Construct text to insert: opening_char + selected_text + closing_char
                const textToInsert = `${key}${selectedText}${closingChar}`;
                // Insert the text, replacing the selection if any
                editor.setRangeText(textToInsert, start, end, 'end');

                if (selectedText) {
                    // If text was selected, re-select it inside the pairs
                    editor.setSelectionRange(start + 1, start + 1 + selectedText.length);
                } else {
                    // If no text was selected, place cursor between the pairs
                    editor.setSelectionRange(start + 1, start + 1);
                }
                updatePreview(); // Update preview
                setUnsavedChanges(true); // Mark changes
                updateStatusBar(); // Update counts
                return; // Stop further processing for this keydown
            }

            // --- Auto-List Continuation (Enter key) ---
            if (key === 'Enter') {
                // Find the start of the current line
                const currentLineStart = editor.value.lastIndexOf('\n', start - 1) + 1;
                // Get the content of the current line up to the cursor
                const currentLine = editor.value.substring(currentLineStart, start);
                const trimmedLine = currentLine.trimStart(); // Line content without leading whitespace

                let listPrefix = null; // Stores the list marker and indentation (e.g., "  - ")
                let isEmptyListItem = false; // Flag if the current list item is empty

                // Check for Unordered List Markers ('-', '*', '+')
                for (const marker of listMarkers) {
                    if (trimmedLine.startsWith(marker)) {
                        // Get leading whitespace + marker
                        listPrefix = currentLine.match(/^\s*/)[0] + marker;
                        // Check if the line only contains the marker (and whitespace)
                        isEmptyListItem = trimmedLine.length === marker.length;
                        break; // Found marker, stop checking
                    }
                }

                // Check for Ordered List Markers ('1.', '2.', etc.) if no unordered marker found
                if (!listPrefix) {
                    const orderedMatch = trimmedLine.match(/^(\d+)\.\s+/); // Match digits, period, space
                    if (orderedMatch) {
                        const currentNum = parseInt(orderedMatch[1], 10); // Get current number
                        const indentation = currentLine.match(/^\s*/)[0]; // Get leading whitespace
                        // Create prefix for the next item, incrementing the number
                        listPrefix = `${indentation}${currentNum + 1}. `;
                        // Check if the line only contains the marker (e.g., "1. ")
                        isEmptyListItem = trimmedLine.length === orderedMatch[0].length;
                    }
                }

                 // Check for Task List Markers ('- [ ]', '* [x]', etc.) if other lists not found
                 if (!listPrefix) {
                    // Match '-', '*', or '+' followed by space, '[', space or x, ']', space
                    const taskMatch = trimmedLine.match(/^(-|\*|\+)\s+\[( |x)\]\s+/i);
                    if(taskMatch){
                        const indentation = currentLine.match(/^\s*/)[0]; // Get indentation
                        // Create prefix for the next task item (always unchecked)
                        listPrefix = `${indentation}${taskMatch[1]} [ ] `; // taskMatch[1] is the list marker '-', '*', or '+'
                        // Check if the line only contains the task marker
                        isEmptyListItem = trimmedLine.length === taskMatch[0].length;
                    }
                 }


                // If we found a list marker on the current line
                if (listPrefix) {
                    event.preventDefault(); // Prevent default Enter behavior (just inserting newline)

                    if (isEmptyListItem) {
                        // If the current list item is empty, pressing Enter should remove it
                        // and de-indent (effectively ending the list or moving up a level)
                        // Select the current list item line (marker + whitespace)
                        editor.setSelectionRange(currentLineStart, start);
                        // Replace it with an empty string
                         editor.setRangeText('', currentLineStart, start, 'end');
                         // Insert the newline after the removed list item
                         editor.setRangeText('\n', editor.selectionStart, editor.selectionStart, 'end');
                         // TODO: De-indentation logic could be added here if needed
                    } else {
                        // If the current list item is not empty, continue the list
                        // Insert a newline followed by the calculated list prefix
                        editor.setRangeText(`\n${listPrefix}`, start, end, 'end');
                    }

                    updatePreview();
                    setUnsavedChanges(true);
                    updateStatusBar();
                    return; // Stop further processing for Enter key
                }
            }

            // --- Other Key Handling (Could add Tab indentation, etc. here) ---
             // Example: Tab key for indentation (basic version)
             /*
             if (key === 'Tab') {
                 event.preventDefault();
                 editor.setRangeText('  ', start, end, 'end'); // Insert two spaces
                 updatePreview();
                 setUnsavedChanges(true);
                 updateStatusBar();
                 return;
             }
             */
        }

         // --- Theme Logic ---

         /**
          * Applies the specified theme (light or dark) by adding/removing the 'dark-mode' class to the body.
          * @param {'light' | 'dark'} theme - The theme to apply.
          */
         function applyTheme(theme) {
             currentTheme = theme; // Update state variable
             if (theme === 'dark') {
                 document.body.classList.add('dark-mode');
             } else {
                 document.body.classList.remove('dark-mode');
             }
             // Update the --preview-bg-rgb variable used for the search overlay background
             const bodyStyles = getComputedStyle(document.body);
             const previewBg = bodyStyles.getPropertyValue('--preview-bg').trim();
             // This conversion is basic, might fail for complex color values (hsl, etc.)
             // A more robust solution might involve setting --preview-bg-rgb directly in CSS
             try {
                 // Simple check for hex/rgb
                 if (previewBg.startsWith('#')) {
                     const r = parseInt(previewBg.slice(1, 3), 16);
                     const g = parseInt(previewBg.slice(3, 5), 16);
                     const b = parseInt(previewBg.slice(5, 7), 16);
                     document.documentElement.style.setProperty('--preview-bg-rgb', `${r}, ${g}, ${b}`);
                 } else if (previewBg.startsWith('rgb')) {
                      const rgbValues = previewBg.match(/\d+/g);
                      if (rgbValues && rgbValues.length >= 3) {
                          document.documentElement.style.setProperty('--preview-bg-rgb', `${rgbValues[0]}, ${rgbValues[1]}, ${rgbValues[2]}`);
                      }
                 } else { // Fallback to default light/dark values
                     document.documentElement.style.setProperty('--preview-bg-rgb', theme === 'dark' ? '43, 43, 43' : '255, 255, 255');
                 }
             } catch (e) {
                 console.error("Error setting preview-bg-rgb:", e);
                 document.documentElement.style.setProperty('--preview-bg-rgb', theme === 'dark' ? '43, 43, 43' : '255, 255, 255');
             }
         }

         /**
          * Toggles the theme between light and dark and saves the preference.
          */
         function toggleTheme() {
             const newTheme = currentTheme === 'light' ? 'dark' : 'light';
             applyTheme(newTheme);
             saveStateToLocalStorage(); // Persist theme preference
         }


         // --- Local Storage Persistence ---
         // Key used to store the application state in browser's localStorage
         const LS_KEY = 'browserMarkdownEditorState_v5'; // Increment version if state structure changes significantly

         /**
          * Saves the current application state (notes, active note ID, UI settings)
          * to localStorage. Includes current editor content.
          */
         function saveStateToLocalStorage() {
             // Capture the latest content from the editor into the active note object
             const currentNote = findNoteById(activeNoteId);
             let contentChanged = false;
             if (currentNote && editor.value !== currentNote.content) {
                 currentNote.content = editor.value;
                 // Only update timestamp here if we want autosave to reflect modification time
                 // currentNote.updatedAt = Date.now();
                 contentChanged = true;
             }

             // Construct the state object to save
             const state = {
                 notes: notes, // The array of all note objects
                 activeNoteId: activeNoteId, // ID of the currently active note
                 isSidebarOpen: isSidebarOpen, // Sidebar visibility state
                 untitledCounter: untitledCounter, // Counter for new notes
                 // Persist editor/preview pane split ratio
                 editorPanePercent: parseFloat(editorContainer.style.flexBasis) || 50,
                 currentSortOrder: currentSortOrder, // Selected sort order
                 currentTheme: currentTheme // Selected theme
                 // activeFilterTag could also be saved if desired
             };

             try {
                 // Serialize the state object to JSON and save it
                 localStorage.setItem(LS_KEY, JSON.stringify(state));
                 if(contentChanged) {
                     // Mark as "unsaved" conceptually meaning not saved *to file*, even though saved to localStorage
                     setUnsavedChanges(true, false);
                 }
                 // console.log("State saved to localStorage"); // Optional debug log
             } catch (e) {
                 // Handle potential errors (e.g., localStorage full)
                 console.error("Error saving state to localStorage:", e);
                 // Optionally notify the user
                 // alert("Warning: Could not save session data. LocalStorage might be full or disabled.");
             }
         }

         /**
          * Loads the application state from localStorage upon startup.
          * Initializes the editor with the saved state or default values.
          */
         function loadStateFromLocalStorage() {
             try {
                 const savedState = localStorage.getItem(LS_KEY); // Retrieve saved state string

                 if (savedState) {
                     const state = JSON.parse(savedState); // Parse the JSON string

                     // Restore notes array, ensuring necessary properties exist (for backward compatibility)
                     notes = state.notes || [];
                     notes.forEach(note => {
                         note.isPinned = note.isPinned || false; // Ensure isPinned exists
                         note.createdAt = note.createdAt || Date.now(); // Add createdAt if missing
                         note.updatedAt = note.updatedAt || Date.now(); // Add updatedAt if missing
                     });

                     // Restore other state variables, providing defaults if missing
                     activeNoteId = state.activeNoteId !== undefined ? state.activeNoteId : null;
                      isSidebarOpen = state.isSidebarOpen ?? (state.isSidebarCollapsed !== undefined ? !state.isSidebarCollapsed : false);
                      untitledCounter = state.untitledCounter || 1;
                      currentSortOrder = state.currentSortOrder || 'modified-desc';
                      sortOrderSelect.value = currentSortOrder; // Set dropdown value
                      currentTheme = state.currentTheme || 'light';
                      applyTheme(currentTheme); // Apply the loaded theme

                      // Restore editor/preview pane split
                      const editorPercent = state.editorPanePercent || 50;
                      sidebar.classList.toggle('open', isSidebarOpen); // Apply sidebar state
                      // Update sidebar toggle button text/title based on loaded state
                       const buttonToUpdate = document.getElementById('sidebarToggleBtn');
                       if(buttonToUpdate){
                 buttonToUpdate.innerHTML = `<i data-lucide="${isSidebarOpen ? 'folder-open' : 'folder'}"></i>`;
                           buttonToUpdate.title = isSidebarOpen ? 'Close Sidebar' : 'Open Sidebar';
                           if (typeof lucide !== 'undefined') {
                               lucide.createIcons({}, buttonToUpdate);
                           }
                       }
                     const resizerWidthPercent = (resizer.offsetWidth / container.offsetWidth) * 100 || 0.5; // Estimate resizer width %
                     editorContainer.style.flexBasis = `${editorPercent}%`;
                     preview.style.flexBasis = `${100 - editorPercent - resizerWidthPercent}%`;


                     // Load content into editor
                     if (notes.length > 0) {
                          // If activeNoteId is invalid (null or note doesn't exist), select the first note
                         if (activeNoteId === null || !findNoteById(activeNoteId)) {
                              // Find first note based on current sort order (or just take notes[0])
                              const sortedNotes = sortNotes(notes, currentSortOrder);
                              activeNoteId = sortedNotes.length > 0 ? sortedNotes[0].id : null;
                         }

                         const activeNote = findNoteById(activeNoteId);
                         if (activeNote) {
                             editor.value = activeNote.content; // Load content
                         } else {
                             // If still no valid active note, clear editor
                             editor.value = '';
                             activeNoteId = null;
                         }
                     } else {
                          // If no notes were loaded, clear editor and potentially add a welcome note
                         editor.value = '';
                         activeNoteId = null;
                         // Add a default welcome note if starting fresh after clearing storage
                         // addNote("Welcome!", "# Welcome Back!\n\nStart typing your Markdown notes here.");
                         // return; // Exit after adding note
                     }

                     // Perform initial UI rendering based on loaded state
                     renderUI();
                     updatePreview();
                     setUnsavedChanges(false); // Assume loaded state is "saved" initially
                     console.log("Application state loaded from localStorage");

                 } else {
                     // No saved state found - initialize with defaults
                     applyTheme('light'); // Default to light theme
                     // Add a default welcome note for first-time users
                     addNote("Welcome!", "# Welcome to Browser Markdown Editor!\n\n*   Use the sidebar to manage notes.\n*   Use the toolbar or Markdown syntax to format text.\n*   Your notes are saved automatically in your browser's local storage.\n*   Use the Menu to import/export notes.");
                     setUnsavedChanges(false); // Initial note is considered "saved"
                 }
             } catch (e) {
                 console.error("Error loading state from localStorage:", e);
                 // Fallback to a clean state in case of error
                 notes = [];
                 activeNoteId = null;
                 applyTheme('light');
                 // Add an error message note
                 addNote("Error!", `# Error Loading Previous Session\n\nThere was an error loading your saved notes:\n\n\`\`\`\n${e.message}\n\`\`\`\n\nStarting with a fresh session.`);
                 setUnsavedChanges(false);
                 renderUI();
                 updatePreview();
             }
         }


        // --- Global Keydown Listener for Shortcuts ---

        /**
         * Handles global keydown events for application-wide shortcuts (like Ctrl+S, Ctrl+N).
         * @param {KeyboardEvent} event - The keydown event.
         */
        function handleGlobalKeyDown(event) {
            // Check if modifier key (Ctrl or Cmd on Mac) is pressed
             const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
             const modKey = isMac ? event.metaKey : event.ctrlKey; // Use Meta key (Cmd) on Mac, Ctrl otherwise

            let handled = false; // Flag to check if we handled the event

            if (modKey) {
                switch (event.key.toLowerCase()) {
                    case 's': // Ctrl+S or Cmd+S
                        saveNote(); // Trigger file save
                        handled = true;
                        break;
                    case 'n': // Ctrl+N or Cmd+N
                        addNote(); // Trigger add new note
                        handled = true;
                        break;
                    case 'f': // Ctrl+F or Cmd+F
                        showFindReplace(); // Show find/replace bar
                        handled = true;
                        break;
                    case 'b': // Ctrl+B or Cmd+B (Bold)
                         // Only apply formatting if the editor has focus
                        if (document.activeElement === editor) {
                            applyMarkdownFormatting('**');
                            handled = true;
                        }
                        break;
                    case 'i': // Ctrl+I or Cmd+I (Italic)
                        if (document.activeElement === editor) {
                            applyMarkdownFormatting('*');
                            handled = true;
                        }
                        break;
                     // Add more shortcuts as needed (e.g., Ctrl+Shift+S for Save As - not implemented)
                }
            }

            // Handle Escape key specifically for closing find/replace bar
            if (event.key === 'Escape' && findReplaceBar.style.display !== 'none') {
                hideFindReplace();
                handled = true;
            }
            // Could also use Escape to close search results or menu dropdown

            // If we handled the event, prevent default browser behavior (e.g., browser save dialog on Ctrl+S)
            if (handled) {
                event.preventDefault();
            }
        }


        // --- Event Listeners Setup ---
        // Assign functions to UI element events

        // Editor Events
        editor.addEventListener('input', () => { // Fired when content changes
            updatePreview(); // Update Markdown preview
            updateStatusBar(); // Update word/char counts
            setUnsavedChanges(true, true); // Mark changes as unsaved and update timestamp
            extractAndRenderTags(); // Update tag list dynamically as user types
            // Debounced auto-save to localStorage after a short delay of inactivity
            clearTimeout(autoSaveTimer); // Clear previous timer
            autoSaveTimer = setTimeout(() => {
                saveStateToLocalStorage();
                console.log("Auto-saved state to localStorage."); // Optional log
            }, 2000); // Auto-save after 2 seconds of inactivity
        });
        editor.addEventListener('keydown', handleEditorKeyDown); // Handle auto-pair, auto-list, etc.

        // Editor Toolbar Button Clicks (delegated to the toolbar element)
        editorToolbar.addEventListener('click', (e) => {
            const target = e.target;
            // Check if the clicked element is a button inside the toolbar
            if (target.tagName === 'BUTTON' && target.closest('#editorToolbar')) {
                 // Call formatting function based on button ID
                 switch (target.id) {
                     case 'toolbarH1': applyMarkdownFormatting('# ', '', 'Heading 1', true); break;
                     case 'toolbarH2': applyMarkdownFormatting('## ', '', 'Heading 2', true); break;
                     case 'toolbarH3': applyMarkdownFormatting('### ', '', 'Heading 3', true); break;
                     case 'toolbarBold': applyMarkdownFormatting('**'); break;
                     case 'toolbarItalic': applyMarkdownFormatting('*'); break;
                     case 'toolbarStrikethrough': applyMarkdownFormatting('~~'); break;
                     case 'toolbarBlockquote': applyMarkdownFormatting('> ', '', 'Quote text', true); break;
                     case 'toolbarLink': applyMarkdownFormatting('[', '](url)', 'link text'); break;
                     case 'toolbarCode': applyMarkdownFormatting('`'); break;
                     case 'toolbarListUl': applyMarkdownFormatting('- ', '', 'List item', true); break;
                     case 'toolbarListOl': applyMarkdownFormatting('1. ', '', 'List item', true); break;
                     case 'toolbarTaskList': applyMarkdownFormatting('- [ ] ', '', 'Task item', true); break;
                     case 'toolbarHr': applyMarkdownFormatting('---', '', '', true); break;
                 }
            }
        });

        // Find/Replace Bar Events
        findReplaceToggleBtn.addEventListener('click', showFindReplace); // From menu
        findReplaceCloseBtn.addEventListener('click', hideFindReplace);
        findInput.addEventListener('input', findAllMatches); // Find matches as user types in find input
        findInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') findNext(); // Enter in find input finds next
             // Escape key is handled globally
        });
        replaceInput.addEventListener('keydown', (e) => {
             // Escape key handled globally
             // Could add Enter keybinding for replaceCurrent if desired
        });
        findNextBtn.addEventListener('click', findNext);
        findPrevBtn.addEventListener('click', findPrev);
        replaceBtn.addEventListener('click', replaceCurrent);
        replaceAllBtn.addEventListener('click', replaceAll);

        // Top Controls Bar Button Events
        openBtn.addEventListener('click', openSingleFile); // Open single file button
        // saveBtn (in menu) listener is below
        // newNoteBtn (in menu) listener is below
        addTabBtn.addEventListener('click', () => addNote()); // '+' button in tab bar
        // renameBtn (in menu) listener is below
        closeNoteBtn.addEventListener('click', closeNote); // Close button in controls
        // fileInput event removed - using Tauri dialog instead
        // exportAllBtn (in menu) listener is below
        // importBtn (in menu) listener is below
        // importFolderBtn (in menu) listener is below
        noteSwitcher.addEventListener('change', (event) => { // Dropdown selection change
            const selectedId = Number(event.target.value);
            // Switch tab if selection is valid and different from current
            if (selectedId && selectedId !== activeNoteId) {
                switchTab(selectedId);
            }
        });
        searchBtn.addEventListener('click', performSearch); // 'Go' button for search
        searchInput.addEventListener('keypress', (event) => { // Enter key in search input
            if (event.key === 'Enter') {
                performSearch();
                event.preventDefault(); // Prevent potential form submission
            }
        });
         searchInput.addEventListener('click', closeMenuDropdown); // Close menu when clicking search input

        // Search Results Overlay Events
        searchCloseBtn.addEventListener('click', closeSearchResults);
        // Event delegation for clicking on a search result item
        searchResultsContent.addEventListener('click', (event) => {
            const resultItem = event.target.closest('.search-result-item'); // Find the clicked item
            if (resultItem && resultItem.dataset.id) { // Check if it's a valid item with ID
                const noteIdToSwitch = Number(resultItem.dataset.id);
                switchTab(noteIdToSwitch); // Switch to the clicked note
                closeSearchResults(); // Close overlay after switching
            }
        });

        // Sidebar Events
        sidebarToggleBtn.addEventListener('click', toggleSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', () => { if (isSidebarOpen) toggleSidebar(); });
        document.getElementById('sidebarCloseBtn').addEventListener('click', () => { if (isSidebarOpen) toggleSidebar(); });
        sortOrderSelect.addEventListener('change', (e) => { // Sorting dropdown change
            currentSortOrder = e.target.value; // Update state variable
            saveStateToLocalStorage(); // Persist sort preference
            renderSidebarNoteList(); // Re-render list with new order
        });
        clearTagFilterBtn.addEventListener('click', clearTagFilter); // Button to clear tag filter

        // Menu Events
        menuToggleBtn.addEventListener('click', (event) => {
            event.stopPropagation(); // Prevent document click listener from closing immediately
            toggleMenuDropdown();
        });
        // Assign actions to menu items
        saveBtn.addEventListener('click', saveNote);
        newNoteBtn.addEventListener('click', () => addNote());
        renameBtn.addEventListener('click', renameNote);
        exportAllBtn.addEventListener('click', exportAllNotes);
        importBtn.addEventListener('click', importFiles);
        importFolderBtn.addEventListener('click', importFolder);
        themeToggleBtnMenu.addEventListener('click', toggleTheme);
        document.getElementById('settingsBtn').addEventListener('click', openSettings);
        document.getElementById('aboutBtn').addEventListener('click', openAbout);


        // Mode Switcher Events
        function setMode(mode) {
            if (mode === currentMode) return;
            applyMode(mode);
            readConfig().then(configContent => {
                const lang = parseConfigLanguage(configContent);
                saveConfig(mode, lang);
            });
        }
        viewerModeBtn.addEventListener('click', () => setMode('viewer'));
        editorModeBtn.addEventListener('click', () => setMode('editor'));

        // Theme Toggle Button (in controls)
        themeToggleBtn.addEventListener('click', toggleTheme);

        // Global Click Listener (to close menu when clicking outside)
        document.addEventListener('click', (event) => {
            // If the click is outside the menu button AND outside the dropdown itself
            if (!menuToggleBtn.contains(event.target) && !menuDropdown.contains(event.target)) {
                closeMenuDropdown(); // Close the menu
            }
            // Could add similar logic for closing search results overlay
        });

        // Resizer Event
        resizer.addEventListener('mousedown', startDrag); // Start dragging on mousedown

        // Window Events
        // Warn user about unsaved changes before closing the tab/window
        window.addEventListener('beforeunload', (event) => {
             // Ensure latest state is saved before potentially showing the prompt
             if (notes.length > 0) {
                  clearTimeout(autoSaveTimer); // Cancel any pending auto-save
                  saveStateToLocalStorage(); // Save final state
             }
             // Check the unsavedChanges flag (set when editor content differs from last file save/load)
             // Note: This flag might be true even if changes are saved to localStorage,
             // it indicates changes *since the last file operation or load*.
             // This behavior might need refinement based on desired UX.
             if (unsavedChanges) {
                  // Standard way to trigger the browser's confirmation dialog
                 event.preventDefault(); // Required for Chrome
                 event.returnValue = 'You have unsaved changes. Are you sure you want to leave?'; // Required for older browsers
                 return 'You have unsaved changes. Are you sure you want to leave?'; // For modern browsers
             }
             // If no unsaved changes, allow navigation/closing without prompt
        });

        // Global Keydown Listener for Shortcuts
        document.addEventListener('keydown', handleGlobalKeyDown);


        // --- Initial Setup ---
        // Load previous state from localStorage when the application starts
        loadStateFromLocalStorage();

        // Load Editor/Viewer mode + init config dir + language
        (async () => {
            await loadAndApplyMode();
            const configContent = await readConfig();
            const langName = parseConfigLanguage(configContent);
            await loadLanguage(langName);
        })();

        // Initialize Lucide icons
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }

        // Drag & Drop: open .md/.txt files dropped onto the window
        (async () => {
            try {
                const appWindow = getCurrentWindow();
                await appWindow.onDragDropEvent(async (event) => {
                    if (event.payload.type === 'drop') {
                        const paths = event.payload.paths;
                        if (!paths || paths.length === 0) return;
                        firstAddedNoteIdDuringImport = null;
                        setUnsavedChanges(true);
                        for (const path of paths) {
                            if (!/\.(md|txt)$/i.test(path)) continue;
                            const name = path.split('\\').pop().split('/').pop();
                            try {
                                const content = await invoke('fn_read_file', { path });
                                const existingNote = notes.find(n => n.name === name);
                                if (existingNote) {
                                    const copyName = name.replace(/(\.[^.]*)?$/i, ' (drop)$1');
                                    const id = addNote(copyName, content);
                                    if (firstAddedNoteIdDuringImport === null) firstAddedNoteIdDuringImport = id;
                                } else {
                                    const id = addNote(name, content);
                                    if (firstAddedNoteIdDuringImport === null) firstAddedNoteIdDuringImport = id;
                                }
                            } catch (e) {
                                console.error("Error reading dropped file:", path, e);
                            }
                        }
                        if (firstAddedNoteIdDuringImport && findNoteById(firstAddedNoteIdDuringImport)) {
                            switchTab(firstAddedNoteIdDuringImport);
                        } else {
                            renderUI();
                            saveStateToLocalStorage();
                        }
                    }
                });
            } catch (e) {
                console.error("Drag-drop init error:", e);
            }
        })();

        // Initial UI rendering and preview update happens inside loadStateFromLocalStorage
        // or its fallback initial note creation.

        // Ensure the theme is applied correctly based on the loaded state
        // (applyTheme is called within loadStateFromLocalStorage)

         if (typeof lucide !== 'undefined') { lucide.createIcons(); }

         console.log("Browser Markdown Editor Initialized.");

    </script>
